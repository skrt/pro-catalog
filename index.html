<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>shizai pro Catalog</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    [x-cloak] { display: none !important; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    aside { border-right: 0.5px solid #e5e7eb; }
    aside .border-t { border-top: 0.5px solid #e5e7eb; }
  </style>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="text-gray-900 min-h-screen">

<div x-data="catalog()" x-init="init()" x-cloak class="bg-white min-h-screen">

  <div class="max-w-7xl mx-auto px-4 sm:px-6 flex">

    <!-- Sidebar: Component List -->
    <aside class="w-48 shrink-0 hidden md:block md:pr-6 md:border-r md:border-gray-200 min-h-screen pt-6">
      <div class="sticky top-6 max-h-[calc(100vh-3rem)] flex flex-col">
        <a href="#/" class="shrink-0 mb-5 flex items-end gap-1.5">
          <svg width="70" height="22" viewBox="0 0 80 25" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M25.248 7.63763C23.0338 7.63763 21.1324 8.50844 19.8616 9.92217V0.402924H16.457V24.5968H19.8616V15.7327C19.8616 12.7992 21.7416 10.6897 24.3167 10.6897C26.834 10.6897 28.1103 12.3221 28.1103 15.3203V24.5968H31.5149V14.619C31.5149 10.3535 29.1114 7.63763 25.2469 7.63763H25.248Z" fill="#0F1424"/>
            <path d="M6.7617 24.9998C10.7978 24.9998 13.4797 22.9145 13.4797 19.699C13.4797 15.617 10.0794 15.0779 7.27993 14.6091C5.28283 14.2808 3.59268 13.9921 3.59268 12.5305C3.59268 11.3228 4.75694 10.5221 6.63901 10.5221C8.63972 10.5221 9.83934 11.3667 9.90494 12.9422H13.1298C13.0642 9.73132 10.5706 7.63734 6.71846 7.63734C2.86635 7.63734 0.2982 9.67 0.2982 12.6403C0.2982 16.4772 3.54965 17.104 6.30992 17.5767C8.33747 17.9182 10.115 18.2773 10.115 19.848C10.115 21.2311 8.70958 22.0054 6.88034 22.0054C4.88389 22.0054 3.4129 21.0908 3.32536 19.34H0C0.0873301 22.7742 2.73428 24.9998 6.7617 24.9998V24.9998Z" fill="#0F1424"/>
            <path d="M38.4612 8.0401H35.0566V24.596H38.4612V8.0401Z" fill="#0F1424"/>
            <path d="M36.7563 3.61948C37.7562 3.61948 38.5668 2.80923 38.5668 1.80974C38.5668 0.810249 37.7562 0 36.7563 0C35.7564 0 34.9458 0.810249 34.9458 1.80974C34.9458 2.80923 35.7564 3.61948 36.7563 3.61948Z" fill="#0F1424"/>
            <path d="M78.1894 3.61948C79.1893 3.61948 79.9999 2.80923 79.9999 1.80974C79.9999 0.810249 79.1893 0 78.1894 0C77.1895 0 76.3789 0.810249 76.3789 1.80974C76.3789 2.80923 77.1895 3.61948 78.1894 3.61948Z" fill="#0F1424"/>
            <path d="M79.8929 8.0401H76.4883V24.596H79.8929V8.0401Z" fill="#0F1424"/>
            <path d="M46.434 21.4388L54.3881 8.553V8.0401H41.7412V11.1582H49.1478L41.123 24.1621V24.596H54.4102V21.4388H46.434V21.4388Z" fill="#0F1424"/>
            <path d="M70.3762 8.03166L69.9387 10.102C68.4352 8.55925 66.322 7.63734 63.8804 7.63734C58.9464 7.63734 55.2568 11.3343 55.2568 16.31C55.2568 21.2724 58.9464 25 63.8804 25C66.2941 25 68.3864 24.0915 69.8866 22.5743L70.2167 24.588H72.9644V8.03208L70.3762 8.03166V8.03166ZM64.1481 21.7418C61.026 21.7418 58.7228 19.409 58.7228 16.31C58.7228 13.2109 61.026 10.8781 64.1481 10.8781C67.2703 10.8781 69.5515 13.1892 69.5515 16.31C69.5515 19.4307 67.2703 21.7418 64.1481 21.7418Z" fill="#0F1424"/>
          </svg>
          <span class="text-sm font-semibold text-indigo-600 leading-none pb-px">pro</span>
        </a>
        <div class="relative mb-3 shrink-0">
          <svg class="absolute left-2.5 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
          </svg>
          <input
            type="text"
            x-model="search"
            placeholder="Filter..."
            class="w-full pl-8 pr-3 py-1.5 rounded-md text-sm text-gray-600 bg-gray-50 border-0 focus:outline-none focus:ring-1 focus:ring-indigo-500 placeholder-gray-400"
          >
        </div>
        <nav class="space-y-0.5 overflow-y-auto no-scrollbar flex-1">
          <a
            x-show="!search"
            href="#/"
            :class="!activeComponentId ? 'bg-indigo-50 text-indigo-700' : 'text-gray-900 hover:bg-gray-100'"
            class="block w-full text-left px-2.5 py-1 rounded-md text-sm transition-colors truncate focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-indigo-500 focus-visible:ring-inset"
          >Home</a>
          <div x-show="!search" class="border-t border-gray-200 !mt-3 !mb-3"></div>
          <template x-for="comp in allComponentsSorted" :key="comp.id">
            <div x-show="matchesSearch(comp)">
              <div x-show="comp._firstToken && !search" class="border-t border-gray-200 my-3"></div>
              <a
                :href="'#/' + comp.id"
                :class="activeComponentId === comp.id ? 'bg-indigo-50 text-indigo-700' : 'text-gray-900 hover:bg-gray-100'"
                class="block w-full text-left px-2.5 py-1 rounded-md text-sm transition-colors truncate focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-indigo-500 focus-visible:ring-inset"
                x-text="comp.name"
              ></a>
            </div>
          </template>
          <p x-show="search && !allComponentsSorted.some(c => matchesSearch(c))" class="px-3 py-2 text-xs text-gray-400">検索結果がありません</p>
        </nav>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 min-w-0 md:px-10 md:pt-6 md:pb-10">

      <!-- Mobile Component Selector -->
      <div class="md:hidden mb-4 pt-4">
        <select
          @change="if ($event.target.value) { location.hash = '#/' + $event.target.value; $event.target.value = ''; }"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm bg-white"
        >
          <option value="">Jump to component...</option>
          <template x-for="comp in allComponentsSorted" :key="comp.id">
            <option :value="comp.id" x-text="comp.name"></option>
          </template>
        </select>
      </div>

      <!-- Landing View (no component selected) -->
      <template x-if="!activeComponent">
        <div class="flex flex-col gap-10 pt-4">

          <!-- UI Components by Category -->
          <div x-show="filteredUIComponents.length > 0">
            <h2 class="text-4xl font-semibold tracking-tight mb-10">UI Components</h2>
            <div class="flex flex-col gap-10">
          <template x-for="group in uiComponentsByCategory" :key="group.id">
            <div>
              <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4"><span x-text="group.label"></span></p>
              <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                <template x-for="comp in group.components" :key="comp.id">
                  <a
                    :href="'#/' + comp.id"
                    class="block bg-[#f8f8fa] rounded-xl p-5 hover:bg-[#f0f0f4] transition-all"
                  >
                    <h3 class="text-base font-semibold text-gray-900 mb-2" x-text="comp.name"></h3>
                    <p class="text-xs text-gray-500 line-clamp-2" x-text="comp.description"></p>
                  </a>
                </template>
              </div>
            </div>
          </template>
            </div>
          </div>

          <!-- Design Tokens -->
          <template x-if="filteredTokenComponents.length > 0">
            <div>
              <h2 class="text-4xl font-semibold tracking-tight mb-10">Design Tokens</h2>
              <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                <template x-for="comp in filteredTokenComponents" :key="comp.id">
                  <a
                    :href="'#/' + comp.id"
                    class="block bg-[#f8f8fa] rounded-xl p-5 hover:bg-[#f0f0f4] transition-all"
                  >
                    <h3 class="text-base font-semibold text-gray-900 mb-2" x-text="comp.name"></h3>
                    <p class="text-xs text-gray-500 line-clamp-2" x-text="comp.description || ''"></p>
                  </a>
                </template>
              </div>
            </div>
          </template>

          <!-- Empty State -->
          <div x-show="filteredUIComponents.length === 0 && filteredTokenComponents.length === 0" class="text-center py-16">
            <p class="text-gray-400 text-sm">No components found.</p>
          </div>
        </div>
      </template>

      <!-- Component Detail View -->
      <template x-if="activeComponent">
        <div class="pt-4">
          <!-- Component Detail -->
          <div>

            <!-- Component Header -->
            <div class="flex items-center justify-between gap-3 mb-4">
              <h2 class="text-4xl font-semibold tracking-tight" x-text="activeComponent.name"></h2>
              <div class="flex items-center gap-2 shrink-0">
                <span class="px-2 py-0.5 bg-gray-100 text-gray-600 rounded text-xs font-medium" x-text="getCategoryLabel(activeComponent.category)"></span>
                <template x-if="activeComponent.figmaUrl">
                  <a :href="activeComponent.figmaUrl" target="_blank" rel="noopener" class="inline-flex items-center gap-1 px-2.5 py-1 bg-purple-50 text-purple-700 rounded-md text-xs font-medium hover:bg-purple-100 transition-colors">
                    <svg class="w-3.5 h-3.5" viewBox="0 0 38 57" fill="currentColor"><path d="M19 28.5a9.5 9.5 0 1 1 19 0 9.5 9.5 0 0 1-19 0z"/><path d="M0 47.5A9.5 9.5 0 0 1 9.5 38H19v9.5a9.5 9.5 0 1 1-19 0z"/><path d="M19 0v19h9.5a9.5 9.5 0 1 0 0-19H19z"/><path d="M0 9.5A9.5 9.5 0 0 0 9.5 19H19V0H9.5A9.5 9.5 0 0 0 0 9.5z"/><path d="M0 28.5A9.5 9.5 0 0 0 9.5 38H19V19H9.5A9.5 9.5 0 0 0 0 28.5z"/></svg>
                    Figma
                  </a>
                </template>
              </div>
            </div>

            <!-- Section Nav (hidden if only 1 section) -->
            <nav x-show="(1 + (activeComponent.usage ? 1 : 0) + (activeComponent.props && activeComponent.props.length > 0 ? 1 : 0) + (activeComponent.tokens && activeComponent.tokens.length > 0 ? 1 : 0) + (activeComponent.hasDemo ? 1 : 0) + (activeComponent.spec ? 1 : 0) + (activeComponent.hasExamples ? 1 : 0)) > 1" class="sticky top-0 z-20 bg-white flex gap-5 mt-4 mb-2 border-b border-gray-100 pb-3 pt-3 uppercase text-xs tracking-wider">
              <template x-if="activeComponent.usage">
                <a href="#section-usage" @click.prevent="document.getElementById('section-usage').scrollIntoView({ behavior: 'smooth' })" class="text-gray-500 hover:text-indigo-600 pb-3 -mb-3 border-b-2 border-transparent hover:border-indigo-600 transition-all">Usage</a>
              </template>
              <a href="#section-variants" @click.prevent="document.getElementById('section-variants').scrollIntoView({ behavior: 'smooth' })" class="text-gray-500 hover:text-indigo-600 pb-3 -mb-3 border-b-2 border-transparent hover:border-indigo-600 transition-all">Variants</a>
              <template x-if="activeComponent.hasExamples">
                <a href="#section-examples" @click.prevent="document.getElementById('section-examples').scrollIntoView({ behavior: 'smooth' })" class="text-gray-500 hover:text-indigo-600 pb-3 -mb-3 border-b-2 border-transparent hover:border-indigo-600 transition-all">Examples</a>
              </template>
              <template x-if="activeComponent.props && activeComponent.props.length > 0">
                <a href="#section-props" @click.prevent="document.getElementById('section-props').scrollIntoView({ behavior: 'smooth' })" class="text-gray-500 hover:text-indigo-600 pb-3 -mb-3 border-b-2 border-transparent hover:border-indigo-600 transition-all">Props</a>
              </template>
              <template x-if="activeComponent.tokens && activeComponent.tokens.length > 0">
                <a href="#section-tokens" @click.prevent="document.getElementById('section-tokens').scrollIntoView({ behavior: 'smooth' })" class="text-gray-500 hover:text-indigo-600 pb-3 -mb-3 border-b-2 border-transparent hover:border-indigo-600 transition-all">Tokens</a>
              </template>
              <template x-if="activeComponent.hasDemo">
                <a href="#section-demo" @click.prevent="document.getElementById('section-demo').scrollIntoView({ behavior: 'smooth' })" class="text-gray-500 hover:text-indigo-600 pb-3 -mb-3 border-b-2 border-transparent hover:border-indigo-600 transition-all">Demo</a>
              </template>
              <template x-if="activeComponent.spec">
                <a href="#section-spec" @click.prevent="document.getElementById('section-spec').scrollIntoView({ behavior: 'smooth' })" class="text-gray-500 hover:text-indigo-600 pb-3 -mb-3 border-b-2 border-transparent hover:border-indigo-600 transition-all">Spec</a>
              </template>
            </nav>

            <!-- Usage: いつ・何に使うか（components.json usage。「作る前に読む」情報なので Variants より上） -->
            <template x-if="activeComponent.usage">
              <section id="section-usage" class="py-6 scroll-mt-12">
                <h3 class="text-xl font-normal text-gray-900 mb-4 uppercase">Usage</h3>
                <div class="space-y-7">

                  <!-- いつ使うか（配下に区分テーブルをネスト） -->
                  <template x-if="activeComponent.usage.when">
                    <div>
                      <h4 class="text-xs font-normal text-gray-400 tracking-wider mb-3">いつ使うか</h4>
                      <div class="space-y-1.5">
                        <template x-for="(item, i) in activeComponent.usage.when" :key="i">
                          <div class="flex items-start gap-2">
                            <span class="w-1 h-1 rounded-full bg-gray-300 mt-2.5 shrink-0"></span>
                            <span class="text-sm leading-6 text-gray-700" x-text="item"></span>
                          </div>
                        </template>
                      </div>
                      <template x-if="activeComponent.usage.tables">
                        <div class="mt-4 space-y-6">
                          <template x-for="tbl in activeComponent.usage.tables" :key="tbl.title">
                            <table class="w-full text-xs">
                              <thead class="bg-[#f8f8fa]">
                                <tr class="text-left">
                                  <th class="px-3 py-2 font-semibold text-gray-700 w-44" x-text="tbl.title"></th>
                                  <th class="px-3 py-2 font-semibold text-gray-700">使いどころ</th>
                                </tr>
                              </thead>
                              <tbody>
                                <template x-for="row in tbl.items" :key="row.label">
                                  <tr class="border-b border-gray-100">
                                    <td class="px-3 py-2 align-top font-mono text-indigo-600" x-text="row.label"></td>
                                    <td class="px-3 py-2 text-gray-600" x-text="row.desc"></td>
                                  </tr>
                                </template>
                              </tbody>
                            </table>
                          </template>
                        </div>
                      </template>
                    </div>
                  </template>

                  <!-- 使わないとき・注意 / 使い方のルール -->
                  <template x-for="grp in usageGroups(activeComponent.usage)" :key="grp.key">
                    <div>
                      <h4 class="text-xs font-normal text-gray-400 tracking-wider mb-3" x-text="grp.label"></h4>
                      <div class="space-y-1.5">
                        <template x-for="(item, i) in grp.items" :key="i">
                          <div class="flex items-start gap-2">
                            <span class="w-1 h-1 rounded-full bg-gray-300 mt-2.5 shrink-0"></span>
                            <span class="text-sm leading-6 text-gray-700" x-text="item"></span>
                          </div>
                        </template>
                      </div>
                    </div>
                  </template>

                  <!-- 使い分け（他コンポーネントとの対比のみ） -->
                  <template x-if="activeComponent.usage.vs">
                    <div>
                      <h4 class="text-xs font-normal text-gray-400 tracking-wider mb-3">使い分け</h4>
                      <div class="space-y-1.5">
                        <template x-for="(item, i) in activeComponent.usage.vs" :key="i">
                          <div class="flex items-start gap-2">
                            <span class="w-1 h-1 rounded-full bg-gray-300 mt-2.5 shrink-0"></span>
                            <span class="text-sm leading-6 text-gray-700" x-html="linkifyVs(item)"></span>
                          </div>
                        </template>
                      </div>
                    </div>
                  </template>

                </div>
              </section>
            </template>

            <!-- Preview -->
            <section id="section-variants" class="py-6 scroll-mt-12">
              <h3 class="text-xl font-normal text-gray-900 mb-4 uppercase">Variants</h3>
              <iframe
                :src="activeComponent.preview + '?v=' + cacheKey + (activeComponent.hasDemo ? '&view=preview' : '')"
                class="w-full border-0 rounded-lg"
                :title="activeComponent.name + ' preview'"
                @load="resizeIframe($event.target)"
                style="min-height: 100px;"
              ></iframe>
            </section>

            <!-- Examples -->
            <template x-if="activeComponent.hasExamples">
              <section id="section-examples" class="py-6 scroll-mt-12">
                <h3 class="text-xl font-normal text-gray-900 mb-4 uppercase">Examples</h3>
                <iframe
                  :src="activeComponent.preview + '?v=' + cacheKey + '&view=examples'"
                  class="w-full border-0 rounded-lg"
                  :title="activeComponent.name + ' examples'"
                  @load="resizeIframe($event.target)"
                  style="min-height: 100px;"
                ></iframe>
              </section>
            </template>

            <!-- Props -->
            <template x-if="activeComponent.props && activeComponent.props.length > 0">
              <section id="section-props" class="py-6 scroll-mt-12">
                <h3 class="text-xl font-normal text-gray-900 mb-4 uppercase">Props</h3>
                <table class="w-full text-xs">
                  <thead class="bg-[#f8f8fa]">
                    <tr class="text-left">
                      <th class="px-3 py-2 font-semibold text-gray-700">Name</th>
                      <th class="px-3 py-2 font-semibold text-gray-700">Type</th>
                      <th class="px-3 py-2 font-semibold text-gray-700">Default</th>
                      <th class="px-3 py-2 font-semibold text-gray-700">Values</th>
                      <th class="px-3 py-2 font-semibold text-gray-700">Description</th>
                    </tr>
                  </thead>
                  <tbody>
                    <template x-for="prop in activeComponent.props" :key="prop.name">
                      <tr class="border-b border-gray-100">
                        <td class="px-3 py-2 font-mono text-indigo-600" x-text="prop.name"></td>
                        <td class="px-3 py-2 text-gray-500" x-text="prop.type"></td>
                        <td class="px-3 py-2 font-mono text-gray-500" x-text="prop.default"></td>
                        <td class="px-3 py-2">
                          <template x-if="prop.values">
                            <div class="flex flex-wrap gap-1">
                              <template x-for="v in prop.values" :key="v">
                                <span class="px-1.5 py-0.5 bg-gray-100 text-gray-600 rounded text-xs font-mono" x-text="v"></span>
                              </template>
                            </div>
                          </template>
                          <template x-if="!prop.values">
                            <span class="text-gray-400">-</span>
                          </template>
                        </td>
                        <td class="px-3 py-2 text-gray-600" x-text="prop.description"></td>
                      </tr>
                    </template>
                  </tbody>
                </table>
              </section>
            </template>

            <!-- Tokens -->
            <template x-if="activeComponent.tokens && activeComponent.tokens.length > 0">
              <section id="section-tokens" class="py-6 scroll-mt-12">
                <h3 class="text-xl font-normal text-gray-900 mb-4 uppercase">Tokens</h3>
                <div class="space-y-6">
                  <template x-for="group in activeComponent.tokens" :key="group.category">
                    <div>
                      <h4 class="text-xs font-normal text-gray-400 tracking-wider mb-3"><span x-text="group.category"></span></h4>
                      <div>
                        <template x-for="item in group.items" :key="item.variant">
                          <div>
                            <div class="px-3 py-2 bg-[#f8f8fa]">
                              <span class="text-xs font-semibold text-gray-700" x-text="item.variant"></span>
                            </div>
                            <template x-for="(tokenVal, tokenKey) in item.tokens" :key="tokenKey">
                              <div class="flex items-center px-3 py-1.5 border-b border-gray-100">
                                <span class="w-40 shrink-0 text-xs text-gray-500" x-text="tokenKey"></span>
                                <template x-if="tokenKey === 'ref'">
                                  <span class="text-xs">
                                    <a :href="'#/' + tokenVal" class="text-purple-700 bg-purple-50 px-2 py-0.5 rounded font-mono underline hover:text-purple-900" x-text="components.find(c => c.id === tokenVal)?.name || tokenVal"></a>
                                  </span>
                                </template>
                                <template x-if="tokenKey !== 'ref'">
                                  <code class="text-xs text-purple-700 bg-purple-50 px-2 py-0.5 rounded font-mono" x-text="tokenVal"></code>
                                </template>
                              </div>
                            </template>
                          </div>
                        </template>
                      </div>
                    </div>
                  </template>
                </div>
              </section>
            </template>

            <!-- Demo (separate iframe) -->
            <template x-if="activeComponent.hasDemo">
              <section id="section-demo" class="py-6 scroll-mt-12">
                <h3 class="text-xl font-normal text-gray-900 mb-4 uppercase">Demo</h3>
                <div class="relative">
                  <iframe
                    :src="activeComponent.preview + '?v=' + cacheKey + '&view=demo'"
                    class="w-full border-0 rounded-lg"
                    :title="activeComponent.name + ' demo'"
                    @load="resizeIframe($event.target)"
                    style="min-height: 100px;"
                  ></iframe>
                </div>
              </section>
            </template>

            <!-- Spec -->
            <template x-if="activeComponent.spec">
              <section id="section-spec" class="py-6 scroll-mt-12">
                <h3 class="text-xl font-normal text-gray-900 mb-4 uppercase">Spec</h3>
                <div class="space-y-8">

                  <!-- Anatomy: data kept in JSON for AI consumption, hidden from UI -->

                  <!-- States -->
                  <template x-if="activeComponent.spec.states">
                    <div>
                      <h4 class="text-xs font-normal text-gray-400 tracking-wider mb-3">States</h4>
                      <table class="w-full text-xs">
                        <thead class="bg-[#f8f8fa]">
                          <tr class="text-left">
                            <th class="px-3 py-2 font-semibold text-gray-700 w-48">遷移</th>
                            <th class="px-3 py-2 font-semibold text-gray-700">操作</th>
                            <th class="px-3 py-2 font-semibold text-gray-700">結果</th>
                          </tr>
                        </thead>
                        <tbody>
                          <template x-for="s in activeComponent.spec.states" :key="s.transition || s.name">
                            <tr class="border-b border-gray-100">
                              <td class="px-3 py-2 font-mono text-indigo-600 font-semibold" x-text="s.transition || s.name"></td>
                              <td class="px-3 py-2 text-gray-600" x-text="s.trigger"></td>
                              <td class="px-3 py-2 text-gray-700" x-text="s.effect"></td>
                            </tr>
                          </template>
                        </tbody>
                      </table>
                    </div>
                  </template>

                  <!-- Behavior -->
                  <template x-if="activeComponent.spec.behavior">
                    <div>
                      <h4 class="text-xs font-normal text-gray-400 tracking-wider mb-3">Behavior</h4>
                      <div class="space-y-1">
                        <template x-for="b in activeComponent.spec.behavior" :key="b.action">
                          <div class="flex items-start px-3 py-1.5 border-b border-gray-100">
                            <span class="w-32 shrink-0 text-xs font-semibold text-gray-700" x-text="b.action"></span>
                            <span class="text-xs text-gray-600" x-text="b.detail"></span>
                          </div>
                        </template>
                      </div>
                    </div>
                  </template>

                  <!-- Keyboard -->
                  <template x-if="activeComponent.spec.keyboard">
                    <div>
                      <h4 class="text-xs font-normal text-gray-400 tracking-wider mb-3">Keyboard</h4>
                      <div class="space-y-1">
                        <template x-for="k in activeComponent.spec.keyboard" :key="k.key">
                          <div class="flex items-center px-3 py-1.5 border-b border-gray-100">
                            <div class="w-32 shrink-0"><kbd class="text-xs font-mono bg-gray-100 text-gray-700 px-1.5 py-0.5 rounded border border-gray-200" x-text="k.key"></kbd></div>
                            <span class="text-xs text-gray-600" x-text="k.action"></span>
                          </div>
                        </template>
                      </div>
                    </div>
                  </template>

                </div>
              </section>
            </template>

          </div>
        </div>
      </template>

    </main>
  </div>
</div>

<script>
function catalog() {
  return {
    search: '',
    activeComponentId: null,
    categories: [],
    components: [],
    cacheKey: Date.now(),

    async init() {
      try {
        const res = await fetch('components.json?v=' + this.cacheKey);
        const data = await res.json();
        this.categories = data.categories || [];
        this.components = data.components || [];
      } catch (e) {
        console.error('Failed to load components.json:', e);
      }
      this.updateFromHash();
      window.addEventListener('hashchange', () => this.updateFromHash());
    },

    updateFromHash() {
      const m = window.location.hash.match(/^#\/(.+)$/);
      // 旧URL形式（#comp-button）からのリダイレクト
      const legacy = window.location.hash.match(/^#comp-(.+)$/);
      if (legacy) {
        window.location.hash = '#/' + legacy[1];
        return;
      }
      this.activeComponentId = m ? m[1] : null;
      window.scrollTo(0, 0);
    },

    get activeComponent() {
      if (!this.activeComponentId) return null;
      return this.components.find(c => c.id === this.activeComponentId) || null;
    },

    get allComponentsSorted() {
      const ui = this.components.filter(c => c.category !== 'design-tokens').sort((a, b) => a.name.localeCompare(b.name));
      const tokens = this.components.filter(c => c.category === 'design-tokens').sort((a, b) => a.name.localeCompare(b.name));
      if (tokens.length > 0) tokens[0]._firstToken = true;
      return [...ui, ...tokens];
    },

    matchesSearch(c) {
      const q = this.search.toLowerCase();
      return !q
        || c.name.toLowerCase().includes(q)
        || (c.description || '').toLowerCase().includes(q)
        || c.category.toLowerCase().includes(q);
    },

    get filteredUIComponents() {
      return this.components.filter(c => c.category !== 'design-tokens' && this.matchesSearch(c)).sort((a, b) => a.name.localeCompare(b.name));
    },

    get filteredTokenComponents() {
      return this.components.filter(c => c.category === 'design-tokens' && this.matchesSearch(c)).sort((a, b) => a.name.localeCompare(b.name));
    },

    get uiComponentsByCategory() {
      const cats = this.categories.filter(c => c.id !== 'design-tokens');
      return cats.map(cat => ({
        ...cat,
        components: this.components.filter(c => c.category === cat.id && this.matchesSearch(c)).sort((a, b) => a.name.localeCompare(b.name))
      })).filter(g => g.components.length > 0);
    },

    getCategoryLabel(id) {
      const cat = this.categories.find(c => c.id === id);
      return cat ? cat.label : id;
    },

    // 使い分けテキスト中のコンポーネント名をリンク化（長い名前優先・自分自身は除外）
    linkifyVs(text) {
      const esc = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const names = this.components
        .filter(c => c.id !== this.activeComponentId)
        .map(c => ({ name: c.name, id: c.id }))
        .sort((a, b) => b.name.length - a.name.length);
      if (!names.length) return esc;
      const re = new RegExp(names.map(n => n.name).join('|'), 'g');
      const byName = Object.fromEntries(names.map(n => [n.name, n.id]));
      return esc.replace(re, m => `<a href="#/${byName[m]}" class="text-indigo-600 underline underline-offset-2 hover:text-indigo-800">${m}</a>`);
    },

    usageGroups(usage) {
      const defs = [
        { key: 'avoid', label: '使わないとき・注意' },
        { key: 'rules', label: '使い方のルール' },
      ];
      return defs
        .filter(d => usage[d.key] && usage[d.key].length > 0)
        .map(d => ({ ...d, items: usage[d.key] }));
    },

    resizeIframe(iframe) {
      const doResize = () => {
        try {
          const h = iframe.contentDocument.body.scrollHeight;
          iframe.style.height = (h + 32) + 'px';
        } catch (e) {
          iframe.style.height = '400px';
        }
      };
      doResize();
      setTimeout(doResize, 500);
      setTimeout(doResize, 1500);
      try {
        const ro = new ResizeObserver(doResize);
        ro.observe(iframe.contentDocument.body);
      } catch (e) {
        setTimeout(doResize, 3000);
      }
    }
  };
}
</script>

</body>
</html>
