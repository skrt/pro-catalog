<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            badge: {
              gray: '#4A5565',
              red: '#E7000B',
              orange: '#F54A00',
              amber: '#E17100',
              blue: '#155dfc',
              teal: '#009689',
            }
          }
        }
      }
    }
  </script>
<style>#back-link { display: inline-flex; } .in-iframe #back-link { display: none; } .in-iframe body { padding: 0 !important; } .in-iframe.demo-only body { background: #f8f8fa !important; padding: 36px 32px 32px !important; }</style>
<script>if (window !== window.top) { document.documentElement.classList.add("in-iframe"); var view = new URLSearchParams(location.search).get("view"); if (view === "demo") document.documentElement.classList.add("demo-only"); document.addEventListener("DOMContentLoaded", function() { var el = document.getElementById("back-link"); if (el) el.remove(); var demo = document.getElementById("demo-section"); if (view === "demo" && demo) { document.body.appendChild(demo); Array.from(document.body.children).forEach(function(c) { if (c === demo || c.tagName === "SCRIPT" || c.hasAttribute("data-demo-keep")) return; c.remove(); }); } else if (view === "preview" && demo) { demo.remove(); } }); }</script>
</head>
<body class="bg-white p-6 space-y-10">
  <a href="../" class="inline-flex items-center gap-1 text-sm text-gray-400 hover:text-gray-600 mb-4" id="back-link">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
    一覧に戻る
  </a>

  <!-- Text Type -->
  <!-- Row: HORIZONTAL, gap=8, padding=0, title=120px FIXED 16px/Regular gray-600, content=HUG 16px/Regular gray-900 -->
  <section>
    <h3 class="text-xs font-normal text-gray-400 tracking-wider mb-4">Text Type</h3>
    <div class="space-y-4">
      <!-- Row 1 -->
      <div class="flex items-start gap-2">
        <span class="text-base font-normal text-gray-600 w-[120px] shrink-0">会社名</span>
        <span class="text-base font-normal text-gray-900">株式会社サンプル</span>
      </div>
      <!-- Row 2 -->
      <div class="flex items-start gap-2">
        <span class="text-base font-normal text-gray-600 w-[120px] shrink-0">担当者</span>
        <span class="text-base font-normal text-gray-900">田中太郎</span>
      </div>
      <!-- Row 3 -->
      <div class="flex items-start gap-2">
        <span class="text-base font-normal text-gray-600 w-[120px] shrink-0">メール</span>
        <span class="text-base font-normal text-gray-900">tanaka@example.com</span>
      </div>
    </div>
  </section>

  <!-- Link Type -->
  <!-- content: 16px/Regular indigo-500 -->
  <section>
    <h3 class="text-xs font-normal text-gray-400 tracking-wider mb-4">Link Type</h3>
    <div class="space-y-4">
      <div class="flex items-start gap-2">
        <span class="text-base font-normal text-gray-600 w-[120px] shrink-0">発注書</span>
        <a href="#" class="text-base font-normal text-indigo-500 hover:underline">PO-2024-001</a>
      </div>
    </div>
  </section>

  <!-- Slot Type -->
  <!-- WMSで変動する要素に使います。Multiple values separated by "/" (gray-400), values in indigo-500 -->
  <section>
    <h3 class="text-xs font-normal text-gray-400 tracking-wider mb-4">Slot Type</h3>
    <div class="space-y-4">
      <div class="flex items-start gap-2">
        <span class="text-base font-normal text-gray-600 w-[120px] shrink-0">関連書類</span>
        <div class="flex items-center gap-2">
          <a href="#" class="text-base font-normal text-indigo-500 hover:underline">見積書</a>
          <span class="text-base font-normal text-gray-400">/</span>
          <a href="#" class="text-base font-normal text-indigo-500 hover:underline">請求書</a>
          <span class="text-base font-normal text-gray-400">/</span>
          <a href="#" class="text-base font-normal text-indigo-500 hover:underline">納品書</a>
        </div>
      </div>
    </div>
  </section>

  <!-- Badge Type -->
  <!-- Badge = Badge component instance (Color=red): bg=#FFFFFF, border=#E7000B 1px, radius=full, padding=2px 6px, text=12px/Medium #E7000B -->
  <!-- Row: counterAxisAlignItems=CENTER -->
  <section>
    <h3 class="text-xs font-normal text-gray-400 tracking-wider mb-4">Badge Type</h3>
    <div class="space-y-4">
      <div class="flex items-center gap-2">
        <span class="text-base font-normal text-gray-600 w-[120px] shrink-0">ステータス</span>
        <span class="inline-flex items-center h-5 px-2 rounded-full text-xs font-semibold bg-white border text-badge-red border-badge-red">
          承認待ち
        </span>
      </div>
    </div>
  </section>

  <!-- Select Type -->
  <!-- Select = xs Select component: w=80px, border=amber-600(#E17100), text=amber-600, 12px/Regular, rounded-md, px-2 py-1 -->
  <!-- Row: counterAxisAlignItems=CENTER -->
  <section>
    <h3 class="text-xs font-normal text-gray-400 tracking-wider mb-4">Select Type</h3>
    <div class="space-y-4">
      <div class="flex items-center gap-2">
        <span class="text-base font-normal text-gray-600 w-[120px] shrink-0">ステータス</span>
        <div>
          <div class="inline-flex items-center gap-1 px-2 py-1 border border-badge-amber rounded-md bg-white">
            <span class="text-xs text-badge-amber leading-4 whitespace-nowrap">納品待ち</span>
            <svg class="w-3 h-3 text-badge-amber shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
          </div>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <span class="text-base font-normal text-gray-600 w-[120px] shrink-0">ステータス</span>
        <div>
          <div class="inline-flex items-center gap-1 px-2 py-1 border border-badge-teal rounded-md bg-white">
            <span class="text-xs text-badge-teal leading-4 whitespace-nowrap">納品済み</span>
            <svg class="w-3 h-3 text-badge-teal shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
          </div>
        </div>
      </div>
    </div>
  </section>

</body>
</html>
