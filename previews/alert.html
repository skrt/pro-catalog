<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
<style>#back-link { display: inline-flex; } .in-iframe #back-link { display: none; } .in-iframe body { padding: 0 !important; } .in-iframe.demo-only body { background: #f8f8fa !important; padding: 36px 32px 32px !important; }</style>
<script>if (window !== window.top) { document.documentElement.classList.add("in-iframe"); var view = new URLSearchParams(location.search).get("view"); if (view === "demo") document.documentElement.classList.add("demo-only"); document.addEventListener("DOMContentLoaded", function() { var el = document.getElementById("back-link"); if (el) el.remove(); var demo = document.getElementById("demo-section"); if (view === "demo" && demo) { document.body.appendChild(demo); Array.from(document.body.children).forEach(function(c) { if (c === demo || c.tagName === "SCRIPT" || c.hasAttribute("data-demo-keep")) return; c.remove(); }); } else if (view === "preview" && demo) { demo.remove(); } }); }</script>
</head>
<body class="bg-white p-6 space-y-10">
  <a href="../" class="inline-flex items-center gap-1 text-sm text-gray-400 hover:text-gray-600 mb-4" id="back-link">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
    一覧に戻る
  </a>
  <section>
    <h3 class="text-xs font-normal text-gray-400 tracking-wider mb-4">Status Variants</h3>
    <div class="space-y-4" style="max-width: 400px;">

      <!-- Success: bg=teal-50(#F0FDFA), border=teal-600(#009689)(1px), icon=teal-600(#009689), title=#000000, desc=#4A5565 -->
      <div class="flex items-start gap-3 rounded-md border bg-[#F0FDFA] border-[#009689]" style="padding: 12px 16px;">
        <div class="flex-shrink-0 mt-[3px]">
          <svg class="w-4 h-4 text-[#009689]"><use href="icons.svg#icon-circle-check"/></svg>
        </div>
        <div class="flex flex-col gap-2">
          <p class="text-sm font-semibold text-black leading-5">Success</p>
          <p class="text-sm font-normal text-[#4A5565] leading-5">This is a success message.</p>
        </div>
      </div>

      <!-- Warning: bg=amber-50(#FFFBEB), border=amber-600(#E17100)(1px), icon=amber-500(#FD9A00), title=#000000, desc=#4A5565 -->
      <div class="flex items-start gap-3 rounded-md border bg-[#FFFBEB] border-[#E17100]" style="padding: 12px 16px;">
        <div class="flex-shrink-0 mt-[3px]">
          <svg class="w-4 h-4 text-[#FD9A00]"><use href="icons.svg#icon-triangle-alert"/></svg>
        </div>
        <div class="flex flex-col gap-2">
          <p class="text-sm font-semibold text-black leading-5">Warning</p>
          <p class="text-sm font-normal text-[#4A5565] leading-5">This is a warning message.</p>
        </div>
      </div>

      <!-- Error: bg=#FEF2F2, border=#E7000B(1px), icon=#E7000B, title=#000000, desc=#4A5565 -->
      <div class="flex items-start gap-3 rounded-md border bg-[#FEF2F2] border-[#E7000B]" style="padding: 12px 16px;">
        <div class="flex-shrink-0 mt-[3px]">
          <svg class="w-4 h-4 text-[#E7000B]"><use href="icons.svg#icon-circle-alert"/></svg>
        </div>
        <div class="flex flex-col gap-2">
          <p class="text-sm font-semibold text-black leading-5">Error</p>
          <p class="text-sm font-normal text-[#4A5565] leading-5">This is an error message.</p>
        </div>
      </div>

      <!-- Info: bg=#F9FAFB, border=#4A5565(1px), icon=#4A5565, title=#000000, desc=#4A5565 -->
      <div class="flex items-start gap-3 rounded-md border bg-[#F9FAFB] border-[#4A5565]" style="padding: 12px 16px;">
        <div class="flex-shrink-0 mt-[3px]">
          <svg class="w-4 h-4 text-[#4A5565]"><use href="icons.svg#icon-info"/></svg>
        </div>
        <div class="flex flex-col gap-2">
          <p class="text-sm font-semibold text-black leading-5">Info</p>
          <p class="text-sm font-normal text-[#4A5565] leading-5">This is an info message.</p>
        </div>
      </div>

    </div>
  </section>
</body>
</html>
