<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<style type="text/tailwindcss">
  @theme {
    /* shizai-pro Rails app/assets/tailwind/application.css と同一のトークン定義 */
    --color-badge-gray: #4A5565;
    --color-badge-red: #E7000B;
    --color-badge-orange: #F54A00;
    --color-badge-amber: #E17100;
    --color-badge-blue: #155dfc;
    --color-badge-teal: #009689;
    --color-badge-violet: #7F22FE;

    --color-toast-success: #009689;
    --color-toast-warning: #FD9A00;
    --color-toast-error: #FB2C36;
    --color-toast-info: #6A7282;

    --color-btn-primary: #615fff;
    --color-btn-primary-hover: #4f39f6;
    --color-btn-primary-active: #432dd7;
    --color-btn-secondary: #e0e7ff;
    --color-btn-secondary-hover: #c6d2ff;
    --color-btn-secondary-active: #a3b3ff;
    --color-btn-alert: #FB2C36;
    --color-btn-alert-hover: #E7000B;
    --color-btn-alert-active: #C10007;
    --color-btn-tertiary-hover: #f9fafb;
    --color-btn-tertiary-active: #f3f4f6;
    --color-btn-text-secondary: #372aac;
    --color-btn-text-secondary-hover: #312c85;
    --color-btn-text-secondary-active: #2e2670;
    --color-btn-text-tertiary: #101828;

    --shadow-modal: 0 8px 32px -8px rgba(0, 0, 0, 0.16);
  }
</style>
  <style>
  </style>
<style>#back-link { display: inline-flex; } .in-iframe #back-link { display: none; } .in-iframe body { padding: 0 !important; } .in-iframe.demo-only body { background: #f8f8fa !important; padding: 36px 32px 32px !important; }</style>
<script>if (window !== window.top) { document.documentElement.classList.add("in-iframe"); var view = new URLSearchParams(location.search).get("view"); if (view === "demo") document.documentElement.classList.add("demo-only"); document.addEventListener("DOMContentLoaded", function() { var el = document.getElementById("back-link"); if (el) el.remove(); var demo = document.getElementById("demo-section"); if (view === "demo" && demo) { document.body.appendChild(demo); Array.from(document.body.children).forEach(function(c) { if (c === demo || c.tagName === "SCRIPT" || c.hasAttribute("data-demo-keep")) return; c.remove(); }); } else if (view === "preview" && demo) { demo.remove(); } }); }</script>
</head>
<body class="bg-white p-8">
  <a href="../" class="inline-flex items-center gap-1 text-sm text-gray-400 hover:text-gray-600 mb-4" id="back-link">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
    一覧に戻る
  </a>

  <div class="space-y-10">

    <!-- Color Variants (md size) -->
    <div>
      <p class="text-xs font-normal text-gray-400 tracking-wider mb-4">Color Variants</p>
      <div class="flex flex-wrap items-center gap-4">
        <div class="text-center space-y-1.5">
          <button class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold text-white rounded-md bg-btn-primary hover:bg-btn-primary-hover active:bg-btn-primary-active transition-colors">
            <svg class="w-4 h-4"><use href="icons.svg#icon-circle-plus"/></svg>
            Button
            <svg class="w-4 h-4"><use href="icons.svg#icon-chevron-right"/></svg>
          </button>
          <p class="text-[10px] text-gray-400">Primary</p>
        </div>
        <div class="text-center space-y-1.5">
          <button class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold rounded-md bg-btn-secondary text-btn-text-secondary hover:bg-btn-secondary-hover hover:text-btn-text-secondary-hover active:bg-btn-secondary-active active:text-btn-text-secondary-active transition-colors">
            <svg class="w-4 h-4"><use href="icons.svg#icon-circle-plus"/></svg>
            Button
            <svg class="w-4 h-4"><use href="icons.svg#icon-chevron-right"/></svg>
          </button>
          <p class="text-[10px] text-gray-400">Secondary</p>
        </div>
        <div class="text-center space-y-1.5">
          <button class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold rounded-md ring-1 ring-inset ring-gray-200 bg-white text-btn-text-tertiary hover:bg-btn-tertiary-hover active:bg-btn-tertiary-active transition-colors">
            <svg class="w-4 h-4"><use href="icons.svg#icon-circle-plus"/></svg>
            Button
            <svg class="w-4 h-4"><use href="icons.svg#icon-chevron-right"/></svg>
          </button>
          <p class="text-[10px] text-gray-400">Tertiary</p>
        </div>
        <div class="text-center space-y-1.5">
          <button class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold text-white rounded-md bg-btn-alert hover:bg-btn-alert-hover active:bg-btn-alert-active transition-colors">
            <svg class="w-4 h-4"><use href="icons.svg#icon-circle-plus"/></svg>
            Button
            <svg class="w-4 h-4"><use href="icons.svg#icon-chevron-right"/></svg>
          </button>
          <p class="text-[10px] text-gray-400">Alert</p>
        </div>
      </div>
    </div>

    <!-- Sizes (primary) -->
    <div>
      <p class="text-xs font-normal text-gray-400 tracking-wider mb-4">Sizes</p>
      <div class="flex flex-wrap items-end gap-4">
        <div class="text-center space-y-1.5">
          <button class="inline-flex items-center gap-1 px-2 py-1 text-xs font-semibold text-white rounded-md bg-btn-primary hover:bg-btn-primary-hover active:bg-btn-primary-active transition-colors">
            <svg class="w-3 h-3"><use href="icons.svg#icon-circle-plus"/></svg>
            Button
            <svg class="w-3 h-3"><use href="icons.svg#icon-chevron-right"/></svg>
          </button>
          <p class="text-[10px] text-gray-400">xs</p>
        </div>
        <div class="text-center space-y-1.5">
          <button class="inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-semibold text-white rounded-md bg-btn-primary hover:bg-btn-primary-hover active:bg-btn-primary-active transition-colors">
            <svg class="w-3.5 h-3.5"><use href="icons.svg#icon-circle-plus"/></svg>
            Button
            <svg class="w-3.5 h-3.5"><use href="icons.svg#icon-chevron-right"/></svg>
          </button>
          <p class="text-[10px] text-gray-400">sm</p>
        </div>
        <div class="text-center space-y-1.5">
          <button class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold text-white rounded-md bg-btn-primary hover:bg-btn-primary-hover active:bg-btn-primary-active transition-colors">
            <svg class="w-4 h-4"><use href="icons.svg#icon-circle-plus"/></svg>
            Button
            <svg class="w-4 h-4"><use href="icons.svg#icon-chevron-right"/></svg>
          </button>
          <p class="text-[10px] text-gray-400">md</p>
        </div>
        <div class="text-center space-y-1.5">
          <button class="inline-flex items-center gap-2 px-6 py-3 text-base font-semibold text-white rounded-md bg-btn-primary hover:bg-btn-primary-hover active:bg-btn-primary-active transition-colors">
            <svg class="w-5 h-5"><use href="icons.svg#icon-circle-plus"/></svg>
            Button
            <svg class="w-5 h-5"><use href="icons.svg#icon-chevron-right"/></svg>
          </button>
          <p class="text-[10px] text-gray-400">lg</p>
        </div>
      </div>
    </div>

    <!-- States (primary, md size) -->
    <div>
      <p class="text-xs font-normal text-gray-400 tracking-wider mb-4">States (Primary)</p>
      <div class="flex flex-wrap items-center gap-3">
        <!-- Default -->
        <div class="text-center space-y-1.5">
          <button class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold text-white rounded-md bg-btn-primary transition-colors">
            <svg class="w-4 h-4"><use href="icons.svg#icon-circle-plus"/></svg>
            Button
            <svg class="w-4 h-4"><use href="icons.svg#icon-chevron-right"/></svg>
          </button>
          <p class="text-[10px] text-gray-400">Default</p>
        </div>
        <!-- Hover -->
        <div class="text-center space-y-1.5">
          <button class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold text-white rounded-md bg-btn-primary-hover transition-colors">
            <svg class="w-4 h-4"><use href="icons.svg#icon-circle-plus"/></svg>
            Button
            <svg class="w-4 h-4"><use href="icons.svg#icon-chevron-right"/></svg>
          </button>
          <p class="text-[10px] text-gray-400">Hover</p>
        </div>
        <!-- Active -->
        <div class="text-center space-y-1.5">
          <button class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold text-white rounded-md bg-btn-primary-active transition-colors">
            <svg class="w-4 h-4"><use href="icons.svg#icon-circle-plus"/></svg>
            Button
            <svg class="w-4 h-4"><use href="icons.svg#icon-chevron-right"/></svg>
          </button>
          <p class="text-[10px] text-gray-400">Active</p>
        </div>
        <!-- Disabled -->
        <div class="text-center space-y-1.5">
          <button disabled class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold text-white rounded-md bg-gray-200 cursor-not-allowed">
            <svg class="w-4 h-4"><use href="icons.svg#icon-circle-plus"/></svg>
            Button
            <svg class="w-4 h-4"><use href="icons.svg#icon-chevron-right"/></svg>
          </button>
          <p class="text-[10px] text-gray-400">Disabled</p>
        </div>
        <!-- Loading -->
        <div class="text-center space-y-1.5">
          <button disabled class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold text-white rounded-md bg-gray-200 cursor-not-allowed">
            <svg class="w-4 h-4 animate-spin" viewBox="0 0 16 16" fill="none">
              <circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="2" opacity="0.3"/>
              <path d="M14 8a6 6 0 0 0-6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            処理中...
          </button>
          <p class="text-[10px] text-gray-400">Loading</p>
        </div>
      </div>
    </div>

    <!-- Icon Toggle -->
    <div>
      <p class="text-xs font-normal text-gray-400 tracking-wider mb-4">Icon Options</p>
      <div class="flex flex-wrap items-center gap-3">
        <button class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold text-white rounded-md bg-btn-primary hover:bg-btn-primary-hover active:bg-btn-primary-active transition-colors">
          <svg class="w-4 h-4"><use href="icons.svg#icon-circle-plus"/></svg>
          Button
          <svg class="w-4 h-4"><use href="icons.svg#icon-chevron-right"/></svg>
        </button>
        <button class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold text-white rounded-md bg-btn-primary hover:bg-btn-primary-hover active:bg-btn-primary-active transition-colors">
          <svg class="w-4 h-4"><use href="icons.svg#icon-circle-plus"/></svg>
          Button
        </button>
        <button class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold text-white rounded-md bg-btn-primary hover:bg-btn-primary-hover active:bg-btn-primary-active transition-colors">
          Button
          <svg class="w-4 h-4"><use href="icons.svg#icon-chevron-right"/></svg>
        </button>
        <button class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold text-white rounded-md bg-btn-primary hover:bg-btn-primary-hover active:bg-btn-primary-active transition-colors">
          Button
        </button>
      </div>
    </div>

  </div>

</body>
</html>
