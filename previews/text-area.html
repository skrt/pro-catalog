<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<style type="text/tailwindcss">
  @theme {
    /* shizai-pro Rails app/assets/tailwind/application.css と同一のトークン定義 */
    --color-badge-gray: #4A5565;
    --color-badge-red: #E7000B;
    --color-badge-orange: #F54A00;
    --color-badge-amber: #E17100;
    --color-badge-blue: #155dfc;
    --color-badge-teal: #009689;
    --color-badge-violet: #7F22FE;

    --color-toast-success: #009689;
    --color-toast-warning: #FD9A00;
    --color-toast-error: #FB2C36;
    --color-toast-info: #6A7282;

    --color-btn-primary: #615fff;
    --color-btn-primary-hover: #4f39f6;
    --color-btn-primary-active: #432dd7;
    --color-btn-secondary: #e0e7ff;
    --color-btn-secondary-hover: #c6d2ff;
    --color-btn-secondary-active: #a3b3ff;
    --color-btn-danger: #FB2C36;
    --color-btn-danger-hover: #E7000B;
    --color-btn-danger-active: #C10007;
    --color-btn-tertiary-hover: #f9fafb;
    --color-btn-tertiary-active: #f3f4f6;
    --color-btn-text-secondary: #432dd7;
    --color-btn-text-secondary-hover: #372aac;
    --color-btn-text-secondary-active: #312c85;
    --color-btn-text-tertiary: #101828;

    --shadow-modal: 0 8px 32px -8px rgba(0, 0, 0, 0.16);
  }
</style>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<style>#back-link { display: inline-flex; } .in-iframe #back-link { display: none; } .in-iframe body { padding: 0 !important; } .in-iframe.demo-only body { background: #f8f8fa !important; padding: 36px 32px 32px !important; }</style>
<script>if (window !== window.top) { document.documentElement.classList.add("in-iframe"); var view = new URLSearchParams(location.search).get("view"); if (view === "demo") document.documentElement.classList.add("demo-only"); document.addEventListener("DOMContentLoaded", function() { var el = document.getElementById("back-link"); if (el) el.remove(); var demo = document.getElementById("demo-section"); if (view === "demo" && demo) { document.body.appendChild(demo); Array.from(document.body.children).forEach(function(c) { if (c === demo || c.tagName === "SCRIPT" || c.hasAttribute("data-demo-keep")) return; c.remove(); }); } else if (view === "preview" && demo) { demo.remove(); } }); }</script>
</head>
<body class="bg-white p-6 space-y-10">
  <a href="../" class="inline-flex items-center gap-1 text-sm text-gray-400 hover:text-gray-600 mb-4" id="back-link">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
    一覧に戻る
  </a>

  <!-- INTERACTIVE DEMO -->
  <section id="demo-section" x-data="{ value: '', focused: false }">
    <div class="w-80 space-y-2">
      <label class="block text-sm font-semibold text-gray-900">備考 <span class="text-red-500">*</span></label>
      <textarea
        rows="1"
        placeholder="例：納品時の注意事項を入力してください"
        x-model="value"
        @focus="focused = true"
        @blur="focused = false"
        class="block w-full h-20 min-h-20 px-3 py-1.5 text-sm rounded-md placeholder-gray-400 text-gray-900 outline-none resize-y transition-colors"
        :class="focused ? 'border border-indigo-500 ring-1 ring-indigo-500' : 'border border-gray-200'"
      ></textarea>
      <div class="flex justify-between">
        <p class="text-xs text-gray-500">クリックして入力してみてください</p>
        <p class="text-xs text-gray-400" x-text="value.length + '/200'"></p>
      </div>
    </div>
  </section>

  <!-- SIZES -->
  <section>
    <h3 class="text-xs font-normal text-gray-400 tracking-wider mb-4">Sizes</h3>
    <div class="flex items-start gap-6 flex-wrap">

      <!-- XS  h=60 padding 4/8 fontSize=12 -->
      <div class="w-56 space-y-2">
        <label class="block text-xs font-semibold text-gray-900">Label <span class="text-red-500">*</span></label>
        <textarea
          rows="1"
          placeholder="Placeholder"
          class="block w-full h-15 min-h-15 px-2 py-1 text-xs border border-gray-200 rounded-md placeholder-gray-400 text-gray-900 outline-none resize-y"
        ></textarea>
        <p class="text-xs text-gray-500">Helper text</p>
      </div>

      <!-- SM  h=70 padding 6/12 fontSize=14 -->
      <div class="w-56 space-y-2">
        <label class="block text-sm font-semibold text-gray-900">Label <span class="text-red-500">*</span></label>
        <textarea
          rows="1"
          placeholder="Placeholder"
          class="block w-full h-20 min-h-20 px-3 py-1.5 text-sm border border-gray-200 rounded-md placeholder-gray-400 text-gray-900 outline-none resize-y"
        ></textarea>
        <p class="text-xs text-gray-500">Helper text</p>
      </div>

      <!-- MD  h=80 padding 10/16 fontSize=14 -->
      <div class="w-56 space-y-2">
        <label class="block text-sm font-semibold text-gray-900">Label <span class="text-red-500">*</span></label>
        <textarea
          rows="1"
          placeholder="Placeholder"
          class="block w-full h-20 min-h-20 px-4 py-2.5 text-sm border border-gray-200 rounded-md placeholder-gray-400 text-gray-900 outline-none resize-y"
        ></textarea>
        <p class="text-xs text-gray-500">Helper text</p>
      </div>

      <!-- LG  h=100 padding 12/24 fontSize=16 -->
      <div class="w-56 space-y-2">
        <label class="block text-base font-semibold text-gray-900">Label <span class="text-red-500">*</span></label>
        <textarea
          rows="1"
          placeholder="Placeholder"
          class="block w-full h-25 min-h-25 px-6 py-3 text-base border border-gray-200 rounded-md placeholder-gray-400 text-gray-900 outline-none resize-y"
        ></textarea>
        <p class="text-sm text-gray-500">Helper text</p>
      </div>

    </div>
  </section>

  <!-- STATES -->
  <section>
    <h3 class="text-xs font-normal text-gray-400 tracking-wider mb-4">States</h3>
    <div class="flex items-start gap-6 flex-wrap">

      <!-- Default -->
      <div class="w-56 space-y-2">
        <label class="block text-sm font-semibold text-gray-900">Default</label>
        <textarea
          rows="1"
          placeholder="Placeholder"
          class="block w-full h-20 min-h-20 px-3 py-1.5 text-sm border border-gray-200 rounded-md placeholder-gray-400 text-gray-900 outline-none resize-y"
        ></textarea>
        <p class="text-xs text-gray-500">Helper text</p>
      </div>

      <!-- Focus -->
      <div class="w-56 space-y-2">
        <label class="block text-sm font-semibold text-gray-900">Focus</label>
        <textarea
          rows="1"
          placeholder="Placeholder"
          class="block w-full h-20 min-h-20 px-3 py-1.5 text-sm border border-indigo-500 ring-1 ring-indigo-500 rounded-md placeholder-gray-400 text-gray-900 outline-none resize-y"
        ></textarea>
        <p class="text-xs text-gray-500">Helper text</p>
      </div>

      <!-- Error -->
      <div class="w-56 space-y-2">
        <label class="block text-sm font-semibold text-gray-900">Error</label>
        <textarea
          rows="1"
          placeholder="Placeholder"
          class="block w-full h-20 min-h-20 px-3 py-1.5 text-sm border border-red-500 rounded-md placeholder-gray-400 text-gray-900 outline-none resize-y"
        ></textarea>
        <p class="text-xs text-red-500">Error message</p>
      </div>

      <!-- Disabled -->
      <div class="w-56 space-y-2">
        <label class="block text-sm font-semibold text-gray-400">Disabled</label>
        <textarea
          rows="1"
          placeholder="Placeholder"
          disabled
          class="block w-full h-20 min-h-20 px-3 py-1.5 text-sm border border-gray-200 rounded-md bg-gray-50 placeholder-gray-400 text-gray-400 cursor-not-allowed outline-none resize-none"
        ></textarea>
        <p class="text-xs text-gray-500">Helper text</p>
      </div>

      <!-- Filled -->
      <div class="w-56 space-y-2">
        <label class="block text-sm font-semibold text-gray-900">Filled</label>
        <textarea
          rows="1"
          class="block w-full h-20 min-h-20 px-3 py-1.5 text-sm border border-gray-200 rounded-md text-gray-900 outline-none resize-y"
        >Textarea content that spans multiple lines of text.</textarea>
        <p class="text-xs text-gray-500">Helper text</p>
      </div>

    </div>
  </section>

</body>
</html>
