<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<style type="text/tailwindcss">
  @theme {
    /* shizai-pro Rails app/assets/tailwind/application.css と同一のトークン定義 */
    --color-badge-gray: #4A5565;
    --color-badge-red: #E7000B;
    --color-badge-orange: #F54A00;
    --color-badge-amber: #E17100;
    --color-badge-blue: #155dfc;
    --color-badge-teal: #009689;
    --color-badge-violet: #7F22FE;

    --color-toast-success: #009689;
    --color-toast-warning: #FD9A00;
    --color-toast-error: #FB2C36;
    --color-toast-info: #6A7282;

    --color-btn-primary: #615fff;
    --color-btn-primary-hover: #4f39f6;
    --color-btn-primary-active: #432dd7;
    --color-btn-secondary: #e0e7ff;
    --color-btn-secondary-hover: #c6d2ff;
    --color-btn-secondary-active: #a3b3ff;
    --color-btn-alert: #FB2C36;
    --color-btn-alert-hover: #E7000B;
    --color-btn-alert-active: #C10007;
    --color-btn-tertiary-hover: #f9fafb;
    --color-btn-tertiary-active: #f3f4f6;
    --color-btn-text-secondary: #372aac;
    --color-btn-text-secondary-hover: #312c85;
    --color-btn-text-secondary-active: #2e2670;
    --color-btn-text-tertiary: #101828;

    --shadow-modal: 0 8px 32px -8px rgba(0, 0, 0, 0.16);
  }
</style>
<style>#back-link { display: inline-flex; } .in-iframe #back-link { display: none; } .in-iframe body { padding: 0 !important; } .in-iframe.demo-only body { background: #f8f8fa !important; padding: 36px 32px 32px !important; }</style>
<script>if (window !== window.top) { document.documentElement.classList.add("in-iframe"); var view = new URLSearchParams(location.search).get("view"); if (view === "demo") document.documentElement.classList.add("demo-only"); document.addEventListener("DOMContentLoaded", function() { var el = document.getElementById("back-link"); if (el) el.remove(); var demo = document.getElementById("demo-section"); if (view === "demo" && demo) { document.body.appendChild(demo); Array.from(document.body.children).forEach(function(c) { if (c === demo || c.tagName === "SCRIPT" || c.hasAttribute("data-demo-keep")) return; c.remove(); }); } else if (view === "preview" && demo) { demo.remove(); } }); }</script>
</head>
<body class="bg-white p-8">
  <a href="../" class="inline-flex items-center gap-1 text-sm text-gray-400 hover:text-gray-600 mb-4" id="back-link">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
    一覧に戻る
  </a>

  <div class="space-y-10">

    <!-- Color Variants (md size) -->
    <div>
      <p class="text-xs font-normal text-gray-400 tracking-wider mb-4">Color Variants</p>
      <div class="flex flex-wrap items-center gap-4">
        <div class="text-center space-y-1.5">
          <button class="w-10 h-10 rounded-md bg-[#e0e7ff] hover:bg-[#c6d2ff] active:bg-[#a3b3ff] inline-flex items-center justify-center transition-colors">
            <svg class="w-4 h-4 text-[#432dd7]"><use href="icons.svg#icon-arrow-left"/></svg>
          </button>
          <p class="text-[10px] text-gray-400">Secondary</p>
        </div>
        <div class="text-center space-y-1.5">
          <button class="w-10 h-10 rounded-md bg-white border border-[#e5e7eb] hover:bg-[#f9fafb] active:bg-[#f3f4f6] inline-flex items-center justify-center transition-colors">
            <svg class="w-4 h-4 text-[#101828]"><use href="icons.svg#icon-arrow-left"/></svg>
          </button>
          <p class="text-[10px] text-gray-400">Tertiary</p>
        </div>
      </div>
    </div>

    <!-- Sizes (secondary) -->
    <div>
      <p class="text-xs font-normal text-gray-400 tracking-wider mb-4">Sizes</p>
      <div class="flex flex-wrap items-end gap-4">
        <div class="text-center space-y-1.5">
          <button class="w-6 h-6 rounded-md bg-[#e0e7ff] hover:bg-[#c6d2ff] active:bg-[#a3b3ff] inline-flex items-center justify-center transition-colors">
            <svg class="w-3 h-3 text-[#432dd7]"><use href="icons.svg#icon-arrow-left"/></svg>
          </button>
          <p class="text-[10px] text-gray-400">xs</p>
        </div>
        <div class="text-center space-y-1.5">
          <button class="w-8 h-8 rounded-md bg-[#e0e7ff] hover:bg-[#c6d2ff] active:bg-[#a3b3ff] inline-flex items-center justify-center transition-colors">
            <svg class="w-3.5 h-3.5 text-[#432dd7]"><use href="icons.svg#icon-arrow-left"/></svg>
          </button>
          <p class="text-[10px] text-gray-400">sm</p>
        </div>
        <div class="text-center space-y-1.5">
          <button class="w-10 h-10 rounded-md bg-[#e0e7ff] hover:bg-[#c6d2ff] active:bg-[#a3b3ff] inline-flex items-center justify-center transition-colors">
            <svg class="w-4 h-4 text-[#432dd7]"><use href="icons.svg#icon-arrow-left"/></svg>
          </button>
          <p class="text-[10px] text-gray-400">md</p>
        </div>
        <div class="text-center space-y-1.5">
          <button class="w-12 h-12 rounded-md bg-[#e0e7ff] hover:bg-[#c6d2ff] active:bg-[#a3b3ff] inline-flex items-center justify-center transition-colors">
            <svg class="w-5 h-5 text-[#432dd7]"><use href="icons.svg#icon-arrow-left"/></svg>
          </button>
          <p class="text-[10px] text-gray-400">lg</p>
        </div>
      </div>
    </div>

    <!-- States (Secondary, md) -->
    <div>
      <p class="text-xs font-normal text-gray-400 tracking-wider mb-4">States (Secondary)</p>
      <div class="flex flex-wrap items-center gap-4">
        <div class="text-center space-y-1.5">
          <button class="w-10 h-10 rounded-md bg-[#e0e7ff] inline-flex items-center justify-center">
            <svg class="w-4 h-4 text-[#432dd7]"><use href="icons.svg#icon-arrow-left"/></svg>
          </button>
          <p class="text-[10px] text-gray-400">Default</p>
        </div>
        <div class="text-center space-y-1.5">
          <button class="w-10 h-10 rounded-md bg-[#c6d2ff] inline-flex items-center justify-center">
            <svg class="w-4 h-4 text-[#432dd7]"><use href="icons.svg#icon-arrow-left"/></svg>
          </button>
          <p class="text-[10px] text-gray-400">Hover</p>
        </div>
        <div class="text-center space-y-1.5">
          <button class="w-10 h-10 rounded-md bg-[#a3b3ff] inline-flex items-center justify-center">
            <svg class="w-4 h-4 text-[#432dd7]"><use href="icons.svg#icon-arrow-left"/></svg>
          </button>
          <p class="text-[10px] text-gray-400">Active</p>
        </div>
        <div class="text-center space-y-1.5">
          <button disabled class="w-10 h-10 rounded-md bg-[#e5e7eb] inline-flex items-center justify-center cursor-not-allowed">
            <svg class="w-4 h-4 text-white"><use href="icons.svg#icon-arrow-left"/></svg>
          </button>
          <p class="text-[10px] text-gray-400">Disabled</p>
        </div>
      </div>
    </div>

    <!-- Attention Badge -->
    <!-- Secondary: left=(size-6)px top=-2px, Tertiary: left=(size-7)px top=-3px -->
    <div>
      <p class="text-xs font-normal text-gray-400 tracking-wider mb-4">With Attention Badge</p>
      <div class="flex flex-wrap items-start gap-6">
        <!-- Secondary xs (24px): left=18px top=-2px -->
        <div class="relative inline-flex">
          <button class="w-6 h-6 rounded-md bg-[#e0e7ff] hover:bg-[#c6d2ff] active:bg-[#a3b3ff] inline-flex items-center justify-center transition-colors">
            <svg class="w-3 h-3 text-[#432dd7]"><use href="icons.svg#icon-bell"/></svg>
          </button>
          <span class="absolute w-2 h-2 bg-[#fb2c36] rounded-full" style="left:18px;top:-2px"></span>
        </div>
        <!-- Secondary sm (32px): left=26px top=-2px -->
        <div class="relative inline-flex">
          <button class="w-8 h-8 rounded-md bg-[#e0e7ff] hover:bg-[#c6d2ff] active:bg-[#a3b3ff] inline-flex items-center justify-center transition-colors">
            <svg class="w-3.5 h-3.5 text-[#432dd7]"><use href="icons.svg#icon-bell"/></svg>
          </button>
          <span class="absolute w-2 h-2 bg-[#fb2c36] rounded-full" style="left:26px;top:-2px"></span>
        </div>
        <!-- Secondary md (40px): left=34px top=-2px -->
        <div class="relative inline-flex">
          <button class="w-10 h-10 rounded-md bg-[#e0e7ff] hover:bg-[#c6d2ff] active:bg-[#a3b3ff] inline-flex items-center justify-center transition-colors">
            <svg class="w-4 h-4 text-[#432dd7]"><use href="icons.svg#icon-bell"/></svg>
          </button>
          <span class="absolute w-2 h-2 bg-[#fb2c36] rounded-full" style="left:34px;top:-2px"></span>
        </div>
        <!-- Secondary lg (48px): left=42px top=-2px -->
        <div class="relative inline-flex">
          <button class="w-12 h-12 rounded-md bg-[#e0e7ff] hover:bg-[#c6d2ff] active:bg-[#a3b3ff] inline-flex items-center justify-center transition-colors">
            <svg class="w-5 h-5 text-[#432dd7]"><use href="icons.svg#icon-bell"/></svg>
          </button>
          <span class="absolute w-2 h-2 bg-[#fb2c36] rounded-full" style="left:42px;top:-2px"></span>
        </div>
      </div>
      <div class="flex flex-wrap items-start gap-6 mt-4">
        <!-- Tertiary xs (24px): left=17px top=-3px -->
        <div class="relative inline-flex">
          <button class="w-6 h-6 rounded-md bg-white border border-[#e5e7eb] hover:bg-[#f9fafb] active:bg-[#f3f4f6] inline-flex items-center justify-center transition-colors">
            <svg class="w-3 h-3 text-[#101828]"><use href="icons.svg#icon-bell"/></svg>
          </button>
          <span class="absolute w-2 h-2 bg-[#fb2c36] rounded-full" style="left:17px;top:-3px"></span>
        </div>
        <!-- Tertiary sm (32px): left=25px top=-3px -->
        <div class="relative inline-flex">
          <button class="w-8 h-8 rounded-md bg-white border border-[#e5e7eb] hover:bg-[#f9fafb] active:bg-[#f3f4f6] inline-flex items-center justify-center transition-colors">
            <svg class="w-3.5 h-3.5 text-[#101828]"><use href="icons.svg#icon-bell"/></svg>
          </button>
          <span class="absolute w-2 h-2 bg-[#fb2c36] rounded-full" style="left:25px;top:-3px"></span>
        </div>
        <!-- Tertiary md (40px): left=33px top=-3px -->
        <div class="relative inline-flex">
          <button class="w-10 h-10 rounded-md bg-white border border-[#e5e7eb] hover:bg-[#f9fafb] active:bg-[#f3f4f6] inline-flex items-center justify-center transition-colors">
            <svg class="w-4 h-4 text-[#101828]"><use href="icons.svg#icon-bell"/></svg>
          </button>
          <span class="absolute w-2 h-2 bg-[#fb2c36] rounded-full" style="left:33px;top:-3px"></span>
        </div>
        <!-- Tertiary lg (48px): left=41px top=-3px -->
        <div class="relative inline-flex">
          <button class="w-12 h-12 rounded-md bg-white border border-[#e5e7eb] hover:bg-[#f9fafb] active:bg-[#f3f4f6] inline-flex items-center justify-center transition-colors">
            <svg class="w-5 h-5 text-[#101828]"><use href="icons.svg#icon-bell"/></svg>
          </button>
          <span class="absolute w-2 h-2 bg-[#fb2c36] rounded-full" style="left:41px;top:-3px"></span>
        </div>
      </div>
    </div>

  </div>

</body>
</html>
