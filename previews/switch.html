<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<style type="text/tailwindcss">
  @theme {
    /* shizai-pro Rails app/assets/tailwind/application.css と同一のトークン定義 */
    --color-badge-gray: #4A5565;
    --color-badge-red: #E7000B;
    --color-badge-orange: #F54A00;
    --color-badge-amber: #E17100;
    --color-badge-blue: #155dfc;
    --color-badge-teal: #009689;
    --color-badge-violet: #7F22FE;

    --color-toast-success: #009689;
    --color-toast-warning: #FD9A00;
    --color-toast-error: #FB2C36;
    --color-toast-info: #6A7282;

    --color-btn-primary: #615fff;
    --color-btn-primary-hover: #4f39f6;
    --color-btn-primary-active: #432dd7;
    --color-btn-secondary: #e0e7ff;
    --color-btn-secondary-hover: #c6d2ff;
    --color-btn-secondary-active: #a3b3ff;
    --color-btn-danger: #FB2C36;
    --color-btn-danger-hover: #E7000B;
    --color-btn-danger-active: #C10007;
    --color-btn-tertiary-hover: #f9fafb;
    --color-btn-tertiary-active: #f3f4f6;
    --color-btn-text-secondary: #372aac;
    --color-btn-text-secondary-hover: #312c85;
    --color-btn-text-secondary-active: #2e2670;
    --color-btn-text-tertiary: #101828;

    --shadow-modal: 0 8px 32px -8px rgba(0, 0, 0, 0.16);
  }
</style>
  <style>

    /* Switch track base */
    .switch-track {
      position: relative;
      border-radius: 9999px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      flex-shrink: 0;
    }

    /* Switch thumb base */
    .switch-thumb {
      position: absolute;
      background: white;
      border-radius: 9999px;
      box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px -1px rgba(0, 0, 0, 0.1);
      transition: transform 0.15s ease-in-out;
    }

    /* SM: track 32x18, thumb 14px */
    .switch-sm { width: 32px; height: 18px; }
    .switch-sm .switch-thumb { width: 14px; height: 14px; top: 2px; left: 2px; }
    .switch-sm.switch-on .switch-thumb { transform: translateX(14px); }

    /* MD: track 40x22, thumb 18px */
    .switch-md { width: 40px; height: 22px; }
    .switch-md .switch-thumb { width: 18px; height: 18px; top: 2px; left: 2px; }
    .switch-md.switch-on .switch-thumb { transform: translateX(18px); }

    /* LG: track 48x26, thumb 22px */
    .switch-lg { width: 48px; height: 26px; }
    .switch-lg .switch-thumb { width: 22px; height: 22px; top: 2px; left: 2px; }
    .switch-lg.switch-on .switch-thumb { transform: translateX(22px); }

    /* On state: indigo-500 */
    .switch-on { background-color: #615fff; }

    /* Off state: gray-300 */
    .switch-off { background-color: #D1D5DC; }
  </style>
<style>#back-link { display: inline-flex; } .in-iframe #back-link { display: none; } .in-iframe body { padding: 0 !important; } .in-iframe.demo-only body { background: #f8f8fa !important; padding: 36px 32px 32px !important; }</style>
<script>if (window !== window.top) { document.documentElement.classList.add("in-iframe"); var view = new URLSearchParams(location.search).get("view"); if (view === "demo") document.documentElement.classList.add("demo-only"); document.addEventListener("DOMContentLoaded", function() { var el = document.getElementById("back-link"); if (el) el.remove(); var demo = document.getElementById("demo-section"); if (view === "demo" && demo) { document.body.appendChild(demo); Array.from(document.body.children).forEach(function(c) { if (c === demo || c.tagName === "SCRIPT" || c.hasAttribute("data-demo-keep")) return; c.remove(); }); } else if (view === "preview" && demo) { demo.remove(); } }); }</script>
</head>
<body class="bg-white p-6 space-y-10">
  <a href="../" class="inline-flex items-center gap-1 text-sm text-gray-400 hover:text-gray-600 mb-4" id="back-link">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
    一覧に戻る
  </a>

  <!-- SIZES (ON) -->
  <section>
    <h3 class="text-xs font-normal text-gray-400 tracking-wider mb-4">Sizes (On)</h3>
    <div class="flex items-center gap-8">

      <!-- SM ON -->
      <div class="flex flex-col items-center gap-2">
        <div class="switch-track switch-sm switch-on">
          <div class="switch-thumb"></div>
        </div>
        <span class="text-xs text-gray-500">SM</span>
      </div>

      <!-- MD ON -->
      <div class="flex flex-col items-center gap-2">
        <div class="switch-track switch-md switch-on">
          <div class="switch-thumb"></div>
        </div>
        <span class="text-xs text-gray-500">MD</span>
      </div>

      <!-- LG ON -->
      <div class="flex flex-col items-center gap-2">
        <div class="switch-track switch-lg switch-on">
          <div class="switch-thumb"></div>
        </div>
        <span class="text-xs text-gray-500">LG</span>
      </div>

    </div>
  </section>

  <!-- SIZES (OFF) -->
  <section>
    <h3 class="text-xs font-normal text-gray-400 tracking-wider mb-4">Sizes (Off)</h3>
    <div class="flex items-center gap-8">

      <!-- SM OFF -->
      <div class="flex flex-col items-center gap-2">
        <div class="switch-track switch-sm switch-off">
          <div class="switch-thumb"></div>
        </div>
        <span class="text-xs text-gray-500">SM</span>
      </div>

      <!-- MD OFF -->
      <div class="flex flex-col items-center gap-2">
        <div class="switch-track switch-md switch-off">
          <div class="switch-thumb"></div>
        </div>
        <span class="text-xs text-gray-500">MD</span>
      </div>

      <!-- LG OFF -->
      <div class="flex flex-col items-center gap-2">
        <div class="switch-track switch-lg switch-off">
          <div class="switch-thumb"></div>
        </div>
        <span class="text-xs text-gray-500">LG</span>
      </div>

    </div>
  </section>

</body>
</html>
