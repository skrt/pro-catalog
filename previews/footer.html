<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<style type="text/tailwindcss">
  @theme {
    /* shizai-pro Rails app/assets/tailwind/application.css と同一のトークン定義 */
    --color-badge-gray: #4A5565;
    --color-badge-red: #E7000B;
    --color-badge-orange: #F54A00;
    --color-badge-amber: #E17100;
    --color-badge-blue: #155dfc;
    --color-badge-teal: #009689;
    --color-badge-violet: #7F22FE;

    --color-toast-success: #009689;
    --color-toast-warning: #FD9A00;
    --color-toast-error: #FB2C36;
    --color-toast-info: #6A7282;

    --color-btn-primary: #615fff;
    --color-btn-primary-hover: #4f39f6;
    --color-btn-primary-active: #432dd7;
    --color-btn-secondary: #e0e7ff;
    --color-btn-secondary-hover: #c6d2ff;
    --color-btn-secondary-active: #a3b3ff;
    --color-btn-danger: #FB2C36;
    --color-btn-danger-hover: #E7000B;
    --color-btn-danger-active: #C10007;
    --color-btn-tertiary-hover: #f9fafb;
    --color-btn-tertiary-active: #f3f4f6;
    --color-btn-text-secondary: #432dd7;
    --color-btn-text-secondary-hover: #372aac;
    --color-btn-text-secondary-active: #312c85;
    --color-btn-text-tertiary: #101828;

    --shadow-modal: 0 8px 32px -8px rgba(0, 0, 0, 0.16);
  }
</style>
<style>#back-link { display: inline-flex; } .in-iframe #back-link { display: none; } .in-iframe body { padding: 0 !important; } .in-iframe.demo-only body { background: #f8f8fa !important; padding: 36px 32px 32px !important; }</style>
<script>if (window !== window.top) { document.documentElement.classList.add("in-iframe"); var view = new URLSearchParams(location.search).get("view"); if (view === "demo") document.documentElement.classList.add("demo-only"); document.addEventListener("DOMContentLoaded", function() { var el = document.getElementById("back-link"); if (el) el.remove(); var demo = document.getElementById("demo-section"); if (view === "demo" && demo) { document.body.appendChild(demo); Array.from(document.body.children).forEach(function(c) { if (c === demo || c.tagName === "SCRIPT" || c.hasAttribute("data-demo-keep")) return; c.remove(); }); } else if (view === "preview" && demo) { demo.remove(); } }); }</script>
</head>
<body class="bg-white p-8">
  <a href="../" class="inline-flex items-center gap-1 text-sm text-gray-400 hover:text-gray-600 mb-4" id="back-link">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
    一覧に戻る
  </a>

  <div class="space-y-10">

    <!-- DEFAULT -->
    <section>
      <h3 class="text-xs font-normal text-gray-400 tracking-wider mb-4">Default</h3>
      <div class="bg-white border-t border-gray-200 flex items-center justify-end px-10 py-3">
        <!-- 左ボタン（secondary） -->
        <button class="w-40 inline-flex items-center justify-center gap-2 px-6 py-3 text-base font-semibold rounded-md bg-indigo-100 text-indigo-700 hover:bg-indigo-200 active:bg-indigo-300 transition-colors">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.659 22H18a2 2 0 0 0 2-2V8a2.4 2.4 0 0 0-.706-1.706l-3.588-3.588A2.4 2.4 0 0 0 14 2H6a2 2 0 0 0-2 2v9.34"/><path d="M14 2v5a1 1 0 0 0 1 1h5"/><path d="M10.378 12.622a1 1 0 0 1 3 3.003L8.36 20.637a2 2 0 0 1-.854.506l-2.867.837a.5.5 0 0 1-.62-.62l.836-2.869a2 2 0 0 1 .506-.853z"/></svg>
          下書き保存
        </button>
        <!-- 右エリア -->
        <div class="flex-1 flex justify-end">
          <button class="w-80 inline-flex items-center justify-center gap-2 px-6 py-3 text-base font-semibold text-white rounded-md bg-btn-primary hover:bg-btn-primary-hover active:bg-btn-primary-active transition-colors">
            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 12h8"/><path d="M12 8v8"/></svg>
            確認画面へ進む
            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
          </button>
        </div>
      </div>
    </section>

    <!-- TWO RIGHT BUTTONS (承認フロー) -->
    <section>
      <h3 class="text-xs font-normal text-gray-400 tracking-wider mb-4">Two Right Buttons</h3>
      <div class="bg-white border-t border-gray-200 flex items-center justify-end px-6 py-3">
        <!-- 左ボタン（tertiary） -->
        <button class="w-40 inline-flex items-center justify-center gap-2 px-6 py-3 text-base font-semibold rounded-md ring-1 ring-inset ring-gray-200 bg-white text-btn-text-tertiary hover:bg-btn-tertiary-hover active:bg-btn-tertiary-active transition-colors">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14 4 9l5-5"/><path d="M4 9h10.5a5.5 5.5 0 0 1 5.5 5.5 5.5 5.5 0 0 1-5.5 5.5H11"/></svg>
          差し戻し
        </button>
        <!-- 右エリア（ボタン2つ） -->
        <div class="flex-1 flex justify-end gap-2">
          <button class="w-80 inline-flex items-center justify-center gap-2 px-6 py-3 text-base font-semibold text-white rounded-md bg-btn-primary hover:bg-btn-primary-hover active:bg-btn-primary-active transition-colors">
            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z"/></svg>
            編集して承認
          </button>
          <button class="w-80 inline-flex items-center justify-center gap-2 px-6 py-3 text-base font-semibold text-white rounded-md bg-btn-primary hover:bg-btn-primary-hover active:bg-btn-primary-active transition-colors">
            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>
            承認
          </button>
        </div>
      </div>
    </section>

    <!-- BULK ACTIONS (一括操作 / Figma: Type=Count) -->
    <section>
      <h3 class="text-xs font-normal text-gray-400 tracking-wider mb-4">Bulk Actions</h3>
      <div class="bg-white border-t border-gray-200 flex items-center px-6 py-3">
        <!-- 左: 件数 + 選択解除 -->
        <div class="flex items-center gap-3">
          <p class="text-sm font-semibold text-gray-900">3件選択中</p>
          <button class="inline-flex items-center justify-center h-6 rounded-md ring-1 ring-inset ring-gray-200 bg-white hover:bg-gray-50 active:bg-gray-100 text-xs font-semibold text-gray-900 py-1 px-2 transition-colors">選択解除</button>
        </div>
        <!-- 右: 一括操作ドロップダウン2つ（メニューは上方向に開く） -->
        <div class="flex-1 flex justify-end gap-3">
          <button class="inline-flex items-center gap-2 px-6 py-3 text-base font-semibold text-white rounded-md bg-btn-primary hover:bg-btn-primary-hover active:bg-btn-primary-active transition-colors">
            納品ステータス変更
            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
          </button>
          <button class="inline-flex items-center gap-2 px-6 py-3 text-base font-semibold text-white rounded-md bg-btn-primary hover:bg-btn-primary-hover active:bg-btn-primary-active transition-colors">
            会話ステータス変更
            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
          </button>
        </div>
      </div>
    </section>

  </div>
</body>
</html>
