<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <style></style>
<style>#back-link { display: inline-flex; } .in-iframe #back-link { display: none; } .in-iframe body { padding: 0 !important; } .in-iframe.demo-only body { background: #f8f8fa !important; padding: 36px 32px 32px !important; }</style>
<script>if (window !== window.top) { document.documentElement.classList.add("in-iframe"); var view = new URLSearchParams(location.search).get("view"); if (view === "demo") document.documentElement.classList.add("demo-only"); document.addEventListener("DOMContentLoaded", function() { var el = document.getElementById("back-link"); if (el) el.remove(); var demo = document.getElementById("demo-section"); if (view === "demo" && demo) { document.body.appendChild(demo); Array.from(document.body.children).forEach(function(c) { if (c === demo || c.tagName === "SCRIPT" || c.hasAttribute("data-demo-keep")) return; c.remove(); }); } else if (view === "preview" && demo) { demo.remove(); } }); }</script>
</head>
<body class="bg-white p-8">
  <a href="../" class="inline-flex items-center gap-1 text-sm text-gray-400 hover:text-gray-600 mb-4" id="back-link">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
    一覧に戻る
  </a>

  <div class="space-y-10">

  <!-- INTERACTIVE DEMO -->
  <section id="demo-section" x-data="{ value: '', focused: false }">
    <div class="w-56 space-y-2">
      <label class="block text-sm font-normal text-gray-900">数量 <span class="text-red-500">*</span></label>
      <div
        class="flex items-center h-10 px-4 py-2 rounded-md bg-white transition-colors"
        :class="focused ? 'border border-indigo-500 ring-1 ring-indigo-500' : 'border border-gray-200'"
      >
        <input
          type="text"
          inputmode="numeric"
          placeholder="0"
          x-model="value"
          @focus="focused = true"
          @blur="focused = false"
          class="flex-1 text-base text-gray-900 placeholder-gray-400 outline-none bg-transparent text-right"
        />
      </div>
      <p class="text-xs text-gray-500">数値を入力してください</p>
    </div>
  </section>

  <!-- SIZES -->
  <section>
    <h3 class="text-xs font-normal text-gray-400 tracking-wider mb-4">Sizes</h3>
    <div class="flex items-start gap-6 flex-wrap">

      <!-- XS  h=24 padding 4/8 fontSize=12 -->
      <div class="w-56 space-y-2">
        <label class="block text-xs font-normal text-gray-900">Label <span class="text-red-500">*</span></label>
        <input
          type="text"
          placeholder="Placeholder"
          class="w-full h-6 px-2 py-1 text-xs text-right border border-gray-200 rounded-md placeholder-gray-400 text-gray-900 outline-none"
        />
        <p class="text-xs text-gray-500">Helper text</p>
      </div>

      <!-- SM  h=32 padding 6/12 fontSize=14 -->
      <div class="w-56 space-y-2">
        <label class="block text-sm font-normal text-gray-900">Label <span class="text-red-500">*</span></label>
        <input
          type="text"
          placeholder="Placeholder"
          class="w-full h-8 px-3 py-1.5 text-sm text-right border border-gray-200 rounded-md placeholder-gray-400 text-gray-900 outline-none"
        />
        <p class="text-xs text-gray-500">Helper text</p>
      </div>

      <!-- MD  h=40 padding 8/16 fontSize=16 -->
      <div class="w-56 space-y-2">
        <label class="block text-sm font-normal text-gray-900">Label <span class="text-red-500">*</span></label>
        <input
          type="text"
          placeholder="Placeholder"
          class="w-full h-10 px-4 py-2 text-base text-right border border-gray-200 rounded-md placeholder-gray-400 text-gray-900 outline-none"
        />
        <p class="text-xs text-gray-500">Helper text</p>
      </div>

      <!-- LG  h=48 padding 10/20 fontSize=18 -->
      <div class="w-56 space-y-2">
        <label class="block text-base font-normal text-gray-900">Label <span class="text-red-500">*</span></label>
        <input
          type="text"
          placeholder="Placeholder"
          class="w-full h-12 px-5 py-2.5 text-lg text-right border border-gray-200 rounded-md placeholder-gray-400 text-gray-900 outline-none"
        />
        <p class="text-xs text-gray-500">Helper text</p>
      </div>

    </div>
  </section>

  <!-- STATES (Size=md) -->
  <section>
    <h3 class="text-xs font-normal text-gray-400 tracking-wider mb-4">States</h3>
    <div class="flex items-start gap-6 flex-wrap">

      <!-- Default -->
      <div class="w-56 space-y-2">
        <label class="block text-sm font-normal text-gray-900">Default</label>
        <input
          type="text"
          placeholder="Placeholder"
          class="w-full h-10 px-4 py-2 text-base text-right border border-gray-200 rounded-md placeholder-gray-400 text-gray-900 outline-none"
        />
        <p class="text-xs text-gray-500">Helper text</p>
      </div>

      <!-- Focus -->
      <div class="w-56 space-y-2">
        <label class="block text-sm font-normal text-gray-900">Focus</label>
        <input
          type="text"
          placeholder="Placeholder"
          class="w-full h-10 px-4 py-2 text-base text-right border border-indigo-500 ring-1 ring-indigo-500 rounded-md placeholder-gray-400 text-gray-900 outline-none"
        />
        <p class="text-xs text-gray-500">Helper text</p>
      </div>

      <!-- Error -->
      <div class="w-56 space-y-2">
        <label class="block text-sm font-normal text-gray-900">Error</label>
        <input
          type="text"
          placeholder="Placeholder"
          class="w-full h-10 px-4 py-2 text-base text-right border border-red-500 rounded-md placeholder-gray-400 text-gray-900 outline-none"
        />
        <p class="text-xs text-red-500">Error message</p>
      </div>

      <!-- Disabled -->
      <div class="w-56 space-y-2">
        <label class="block text-sm font-normal text-gray-400">Disabled</label>
        <input
          type="text"
          value="10000"
          disabled
          class="w-full h-10 px-4 py-2 text-base text-right border border-gray-200 rounded-md bg-gray-50 text-gray-400 cursor-not-allowed outline-none"
        />
        <p class="text-xs text-gray-500">Helper text</p>
      </div>

      <!-- Filled -->
      <div class="w-56 space-y-2">
        <label class="block text-sm font-normal text-gray-900">Filled</label>
        <input
          type="text"
          value="10000"
          class="w-full h-10 px-4 py-2 text-base text-right border border-gray-200 rounded-md text-gray-900 outline-none"
        />
        <p class="text-xs text-gray-500">Helper text</p>
      </div>

    </div>
  </section>

  </div>
</body>
</html>
