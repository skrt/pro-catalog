<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<style type="text/tailwindcss">
  @theme {
    /* shizai-pro Rails app/assets/tailwind/application.css と同一のトークン定義 */
    --color-badge-gray: #4A5565;
    --color-badge-red: #E7000B;
    --color-badge-orange: #F54A00;
    --color-badge-amber: #E17100;
    --color-badge-blue: #155dfc;
    --color-badge-teal: #009689;
    --color-badge-violet: #7F22FE;

    --color-toast-success: #009689;
    --color-toast-warning: #FD9A00;
    --color-toast-error: #FB2C36;
    --color-toast-info: #6A7282;

    --color-btn-primary: #615fff;
    --color-btn-primary-hover: #4f39f6;
    --color-btn-primary-active: #432dd7;
    --color-btn-secondary: #e0e7ff;
    --color-btn-secondary-hover: #c6d2ff;
    --color-btn-secondary-active: #a3b3ff;
    --color-btn-danger: #FB2C36;
    --color-btn-danger-hover: #E7000B;
    --color-btn-danger-active: #C10007;
    --color-btn-tertiary-hover: #f9fafb;
    --color-btn-tertiary-active: #f3f4f6;
    --color-btn-text-secondary: #432dd7;
    --color-btn-text-secondary-hover: #372aac;
    --color-btn-text-secondary-active: #312c85;
    --color-btn-text-tertiary: #101828;

    --shadow-modal: 0 8px 32px -8px rgba(0, 0, 0, 0.16);
  }
</style>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
  </style>
<style>#back-link { display: inline-flex; } .in-iframe #back-link { display: none; } .in-iframe body { padding: 0 !important; } .in-iframe.demo-only body { background: #f8f8fa !important; padding: 36px 32px 32px !important; }</style>
<script>if (window !== window.top) { document.documentElement.classList.add("in-iframe"); var view = new URLSearchParams(location.search).get("view"); if (view === "demo") document.documentElement.classList.add("demo-only"); document.addEventListener("DOMContentLoaded", function() { var el = document.getElementById("back-link"); if (el) el.remove(); var demo = document.getElementById("demo-section"); if (view === "demo" && demo) { document.body.appendChild(demo); Array.from(document.body.children).forEach(function(c) { if (c === demo || c.tagName === "SCRIPT" || c.hasAttribute("data-demo-keep")) return; c.remove(); }); } else if (view === "preview" && demo) { demo.remove(); } }); }</script>
</head>
<body class="bg-white p-6 space-y-10">
  <a href="../" class="inline-flex items-center gap-1 text-sm text-gray-400 hover:text-gray-600 mb-4" id="back-link">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
    一覧に戻る
  </a>

  <!-- ============================================================ -->
  <!-- RADIO FORM (丸 + ラベル) -->
  <!-- ============================================================ -->

  <!-- Radio Sizes -->
  <section>
    <h3 class="text-xs font-normal text-gray-400 tracking-wider mb-4">Radio — Sizes</h3>
    <div class="flex flex-wrap items-end gap-6">
      <!-- sm: radio 12px, text 14px, gap 8px -->
      <label class="inline-flex items-center gap-2 cursor-pointer">
        <span class="relative w-3 h-3 rounded-full border border-gray-200 bg-white"></span>
        <span class="text-sm text-gray-900">Radio Label</span>
      </label>
      <!-- md: radio 16px, text 16px, gap 8px -->
      <label class="inline-flex items-center gap-2 cursor-pointer">
        <span class="relative w-4 h-4 rounded-full border border-gray-200 bg-white"></span>
        <span class="text-base text-gray-900">Radio Label</span>
      </label>
      <!-- lg: radio 20px, text 18px, gap 8px -->
      <label class="inline-flex items-center gap-2 cursor-pointer">
        <span class="relative w-5 h-5 rounded-full border border-gray-200 bg-white"></span>
        <span class="text-lg text-gray-900">Radio Label</span>
      </label>
    </div>
  </section>

  <!-- Radio States -->
  <section>
    <h3 class="text-xs font-normal text-gray-400 tracking-wider mb-4">Radio — States</h3>
    <div class="flex flex-wrap items-center gap-6">
      <!-- Default -->
      <div class="text-center space-y-1.5">
        <label class="inline-flex items-center gap-2">
          <span class="w-4 h-4 rounded-full border border-gray-200 bg-white"></span>
          <span class="text-base text-gray-900">Radio Label</span>
        </label>
        <p class="text-[10px] text-gray-400">Default</p>
      </div>
      <!-- Selected -->
      <div class="text-center space-y-1.5">
        <label class="inline-flex items-center gap-2">
          <span class="w-4 h-4 rounded-full border-4 border-indigo-500 bg-white"></span>
          <span class="text-base text-gray-900">Radio Label</span>
        </label>
        <p class="text-[10px] text-gray-400">Selected</p>
      </div>
      <!-- Disabled -->
      <div class="text-center space-y-1.5">
        <label class="inline-flex items-center gap-2 cursor-not-allowed">
          <span class="w-4 h-4 rounded-full border border-gray-200 bg-gray-50"></span>
          <span class="text-base text-gray-400">Radio Label</span>
        </label>
        <p class="text-[10px] text-gray-400">Disabled</p>
      </div>
      <!-- Selected + Disabled -->
      <div class="text-center space-y-1.5">
        <label class="inline-flex items-center gap-2 cursor-not-allowed">
          <span class="w-4 h-4 rounded-full border-4 border-gray-400 bg-white"></span>
          <span class="text-base text-gray-400">Radio Label</span>
        </label>
        <p class="text-[10px] text-gray-400">Selected Disabled</p>
      </div>
    </div>
  </section>

  <!-- Radio Container (vertical) -->
  <section>
    <h3 class="text-xs font-normal text-gray-400 tracking-wider mb-4">Radio — Container (vertical)</h3>
    <div class="flex flex-col gap-2" x-data="{ selected: 'option1' }" x-cloak>
      <label class="inline-flex items-center gap-2 cursor-pointer" @click="selected = 'option1'">
        <span class="w-4 h-4 rounded-full transition-all" :class="selected === 'option1' ? 'border-4 border-indigo-500 bg-white' : 'border border-gray-200 bg-white'"></span>
        <span class="text-base text-gray-900">Option 1</span>
      </label>
      <label class="inline-flex items-center gap-2 cursor-pointer" @click="selected = 'option2'">
        <span class="w-4 h-4 rounded-full transition-all" :class="selected === 'option2' ? 'border-4 border-indigo-500 bg-white' : 'border border-gray-200 bg-white'"></span>
        <span class="text-base text-gray-900">Option 2</span>
      </label>
      <label class="inline-flex items-center gap-2 cursor-pointer" @click="selected = 'option3'">
        <span class="w-4 h-4 rounded-full transition-all" :class="selected === 'option3' ? 'border-4 border-indigo-500 bg-white' : 'border border-gray-200 bg-white'"></span>
        <span class="text-base text-gray-900">Option 3</span>
      </label>
    </div>
  </section>

  <!-- ============================================================ -->
  <!-- BUTTON FORM (Pill タブ) -->
  <!-- ============================================================ -->

  <!-- Button — Active: bg=indigo-100(#e0e7ff), text=indigo-700(#432dd7), font-semibold, rounded-md(6px) -->
  <!-- Button — Active with count: counter bg=indigo-100 rounded-sm, text=indigo-700 -->
  <!-- Button — Hover: bg=gray-100(#F3F4F6), text=gray-600(#4A5565), font-normal, rounded-md(6px) -->
  <!-- Button — Inactive: bg=white, text=gray-600(#4A5565), font-normal, rounded-md(6px) -->
  <!-- Button — Inactive with count: counter bg=red-50 text=red-500 rounded-full -->
  <!-- Button — Without counter: py-1.5, with counter: py-1 -->
  <section>
    <h3 class="text-xs font-normal text-gray-400 tracking-wider mb-4">Button — Example</h3>
    <div class="flex gap-1">
      <!-- Active (no counter) -->
      <button class="flex items-center gap-1 text-sm font-semibold px-2 py-1.5 rounded-md bg-indigo-100 text-indigo-700">
        すべて
      </button>
      <!-- Inactive without counter -->
      <button class="flex items-center gap-1 text-sm font-normal px-2 py-1.5 rounded-md bg-white text-gray-600 hover:bg-gray-100 transition-colors">
        下書き
      </button>
      <!-- Inactive with counter -->
      <button class="flex items-center gap-1 text-sm font-normal px-2 py-1 rounded-md bg-white text-gray-600 hover:bg-gray-100 transition-colors">
        承認待ち
        <span class="text-sm font-normal px-2 py-0.5 rounded-full bg-red-50 text-red-500">999</span>
      </button>
      <!-- Inactive with counter -->
      <button class="flex items-center gap-1 text-sm font-normal px-2 py-1 rounded-md bg-white text-gray-600 hover:bg-gray-100 transition-colors">
        送信待ち
        <span class="text-sm font-normal px-2 py-0.5 rounded-full bg-red-50 text-red-500">999</span>
      </button>
      <!-- Inactive with counter -->
      <button class="flex items-center gap-1 text-sm font-normal px-2 py-1 rounded-md bg-white text-gray-600 hover:bg-gray-100 transition-colors">
        納品待ち
        <span class="text-sm font-normal px-2 py-0.5 rounded-full bg-red-50 text-red-500">999</span>
      </button>
      <!-- Inactive with counter -->
      <button class="flex items-center gap-1 text-sm font-normal px-2 py-1 rounded-md bg-white text-gray-600 hover:bg-gray-100 transition-colors">
        会話中
        <span class="text-sm font-normal px-2 py-0.5 rounded-full bg-red-50 text-red-500">999</span>
      </button>
      <!-- Inactive without counter -->
      <button class="flex items-center gap-1 text-sm font-normal px-2 py-1.5 rounded-md bg-white text-gray-600 hover:bg-gray-100 transition-colors">
        納品済み
      </button>
      <!-- Inactive with counter -->
      <button class="flex items-center gap-1 text-sm font-normal px-2 py-1 rounded-md bg-white text-gray-600 hover:bg-gray-100 transition-colors">
        差し戻し
        <span class="text-sm font-normal px-2 py-0.5 rounded-full bg-red-50 text-red-500">999</span>
      </button>
      <!-- Inactive without counter -->
      <button class="flex items-center gap-1 text-sm font-normal px-2 py-1.5 rounded-md bg-white text-gray-600 hover:bg-gray-100 transition-colors">
        取り消し
      </button>
    </div>
  </section>

  <!-- Button States -->
  <section>
    <h3 class="text-xs font-normal text-gray-400 tracking-wider mb-4">Button — States</h3>
    <div class="flex items-end gap-6">
      <!-- Active with count -->
      <div class="flex flex-col items-start gap-1">
        <span class="text-[10px] text-gray-400">active + count</span>
        <button class="flex items-center gap-1 text-sm font-semibold px-2 py-1 rounded-md bg-indigo-100 text-indigo-700">
          Tab
          <span class="text-sm font-normal px-2 py-0.5 rounded-sm bg-indigo-100 text-indigo-700">999</span>
        </button>
      </div>
      <!-- Active without count -->
      <div class="flex flex-col items-start gap-1">
        <span class="text-[10px] text-gray-400">active</span>
        <button class="flex items-center gap-1 text-sm font-semibold px-2 py-1.5 rounded-md bg-indigo-100 text-indigo-700">
          Tab
        </button>
      </div>
      <!-- Inactive with count -->
      <div class="flex flex-col items-start gap-1">
        <span class="text-[10px] text-gray-400">inactive + count</span>
        <button class="flex items-center gap-1 text-sm font-normal px-2 py-1 rounded-md bg-white text-gray-600">
          Tab
          <span class="text-sm font-normal px-2 py-0.5 rounded-full bg-red-50 text-red-500">999</span>
        </button>
      </div>
      <!-- Inactive without count -->
      <div class="flex flex-col items-start gap-1">
        <span class="text-[10px] text-gray-400">inactive</span>
        <button class="flex items-center gap-1 text-sm font-normal px-2 py-1.5 rounded-md bg-white text-gray-600">
          Tab
        </button>
      </div>
      <!-- Hover with count -->
      <div class="flex flex-col items-start gap-1">
        <span class="text-[10px] text-gray-400">hover + count</span>
        <button class="flex items-center gap-1 text-sm font-normal px-2 py-1 rounded-md bg-gray-100 text-gray-600">
          Tab
          <span class="text-sm font-normal px-2 py-0.5 rounded-full bg-red-50 text-red-500">999</span>
        </button>
      </div>
      <!-- Hover without count -->
      <div class="flex flex-col items-start gap-1">
        <span class="text-[10px] text-gray-400">hover</span>
        <button class="flex items-center gap-1 text-sm font-normal px-2 py-1.5 rounded-md bg-gray-100 text-gray-600">
          Tab
        </button>
      </div>
    </div>
  </section>

</body>
</html>
