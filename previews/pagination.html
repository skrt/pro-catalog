<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<style type="text/tailwindcss">
  @theme {
    /* shizai-pro Rails app/assets/tailwind/application.css と同一のトークン定義 */
    --color-badge-gray: #4A5565;
    --color-badge-red: #E7000B;
    --color-badge-orange: #F54A00;
    --color-badge-amber: #E17100;
    --color-badge-blue: #155dfc;
    --color-badge-teal: #009689;
    --color-badge-violet: #7F22FE;

    --color-toast-success: #009689;
    --color-toast-warning: #FD9A00;
    --color-toast-error: #FB2C36;
    --color-toast-info: #6A7282;

    --color-btn-primary: #615fff;
    --color-btn-primary-hover: #4f39f6;
    --color-btn-primary-active: #432dd7;
    --color-btn-secondary: #e0e7ff;
    --color-btn-secondary-hover: #c6d2ff;
    --color-btn-secondary-active: #a3b3ff;
    --color-btn-danger: #FB2C36;
    --color-btn-danger-hover: #E7000B;
    --color-btn-danger-active: #C10007;
    --color-btn-tertiary-hover: #f9fafb;
    --color-btn-tertiary-active: #f3f4f6;
    --color-btn-text-secondary: #372aac;
    --color-btn-text-secondary-hover: #312c85;
    --color-btn-text-secondary-active: #2e2670;
    --color-btn-text-tertiary: #101828;

    --shadow-modal: 0 8px 32px -8px rgba(0, 0, 0, 0.16);
  }
</style>
  <style>#back-link { display: inline-flex; } .in-iframe #back-link { display: none; } .in-iframe body { padding: 0 !important; } .in-iframe.demo-only body { background: #f8f8fa !important; padding: 36px 32px 32px !important; }</style>
  <script>if (window !== window.top) { document.documentElement.classList.add("in-iframe"); var view = new URLSearchParams(location.search).get("view"); if (view === "demo") document.documentElement.classList.add("demo-only"); document.addEventListener("DOMContentLoaded", function() { var el = document.getElementById("back-link"); if (el) el.remove(); var demo = document.getElementById("demo-section"); if (view === "demo" && demo) { document.body.appendChild(demo); Array.from(document.body.children).forEach(function(c) { if (c === demo || c.tagName === "SCRIPT" || c.hasAttribute("data-demo-keep")) return; c.remove(); }); } else if (view === "preview" && demo) { demo.remove(); } }); }</script>
</head>
<body class="bg-white p-6 space-y-10">
  <a href="../" class="inline-flex items-center gap-1 text-sm text-gray-400 hover:text-gray-600 mb-4" id="back-link">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
    一覧に戻る
  </a>

  <!-- =========================================== -->
  <!-- DEFAULT                                      -->
  <!-- Container: bg-white, flex justify-end,        -->
  <!--   px-4 (16px) py-2 (8px)                      -->
  <!-- Buttons: 32px height, border gray-200,        -->
  <!--   rounded-md (6px), gap-2 (8px)               -->
  <!-- Arrow: 32x32, icon 12x12 centered             -->
  <!-- Page: px-3 py-1.5, text-sm font-semibold        -->
  <!-- =========================================== -->
  <section>
    <h3 class="text-xs font-normal text-gray-400 tracking-wider mb-4">Default</h3>
    <div class="bg-white border border-gray-100 rounded-lg">
      <div class="flex items-center justify-end px-4 py-2">
        <div class="flex items-center gap-2">
          <!-- Prev arrow -->
          <button class="w-8 h-8 flex items-center justify-center bg-white border border-gray-200 rounded-md hover:bg-gray-50">
            <svg class="w-3.5 h-3.5 text-gray-700" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
          </button>
          <!-- Pages -->
          <button class="h-8 min-w-8 px-3 py-1.5 bg-white border border-gray-200 rounded-md text-sm font-semibold text-gray-900 leading-5 hover:bg-gray-50">1</button>
          <button class="h-8 min-w-8 px-3 py-1.5 bg-white border border-gray-200 rounded-md text-sm font-semibold text-gray-900 leading-5 hover:bg-gray-50">2</button>
          <button class="h-8 min-w-8 px-3 py-1.5 bg-white border border-gray-200 rounded-md text-sm font-semibold text-gray-900 leading-5 hover:bg-gray-50">3</button>
          <button class="h-8 min-w-8 px-3 py-1.5 bg-white border border-gray-200 rounded-md text-sm font-semibold text-gray-900 leading-5 hover:bg-gray-50">4</button>
          <button class="h-8 min-w-8 px-3 py-1.5 bg-white border border-gray-200 rounded-md text-sm font-semibold text-gray-900 leading-5 hover:bg-gray-50">5</button>
          <!-- Next arrow -->
          <button class="w-8 h-8 flex items-center justify-center bg-white border border-gray-200 rounded-md hover:bg-gray-50">
            <svg class="w-3.5 h-3.5 text-gray-700" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
          </button>
        </div>
      </div>
    </div>
  </section>

  <!-- =========================================== -->
  <!-- With Table (実使用例)                         -->
  <!-- Table 内部に Pagination を配置した例            -->
  <!-- Table: no border, no radius, no header border-b -->
  <!-- =========================================== -->
  <section>
    <h3 class="text-xs font-normal text-gray-400 tracking-wider mb-4">With Table</h3>
    <div class="bg-white">
      <!-- Mini table header: no border-bottom -->
      <div class="bg-gray-50 px-4 py-2">
        <div class="flex items-center text-xs font-semibold text-gray-500 uppercase tracking-wider">
          <span class="w-35">発注書番号</span>
          <span class="w-30">件名</span>
          <span class="w-25">ステータス</span>
          <span class="flex-1">発注日</span>
        </div>
      </div>
      <!-- Mini table rows -->
      <div class="divide-y divide-gray-200">
        <div class="flex items-center px-4 py-2.5 text-sm">
          <span class="w-35 text-gray-900">PO-2024-001</span>
          <span class="w-30 text-gray-900">パウチ追加分</span>
          <span class="w-25"><span class="inline-flex items-center h-5 px-2 rounded-full text-xs font-semibold bg-white border border-badge-gray text-badge-gray">下書き</span></span>
          <span class="flex-1 text-gray-500">2024/01/15</span>
        </div>
        <div class="flex items-center px-4 py-2.5 text-sm">
          <span class="w-35 text-gray-900">PO-2024-002</span>
          <span class="w-30 text-gray-900">新配送箱の件</span>
          <span class="w-25"><span class="inline-flex items-center h-5 px-2 rounded-full text-xs font-semibold bg-white border border-badge-blue text-badge-blue">会話中</span></span>
          <span class="flex-1 text-gray-500">2024/01/16</span>
        </div>
        <div class="flex items-center px-4 py-2.5 text-sm">
          <span class="w-35 text-gray-900">PO-2024-003</span>
          <span class="w-30 text-gray-900">6月納品分</span>
          <span class="w-25"><span class="inline-flex items-center h-5 px-2 rounded-full text-xs font-semibold bg-white border border-badge-teal text-badge-teal">納品済み</span></span>
          <span class="flex-1 text-gray-500">2024/01/17</span>
        </div>
      </div>
      <!-- Pagination (テーブル内) -->
      <div class="flex items-center justify-end px-4 py-2">
        <div class="flex items-center gap-2">
          <button class="w-8 h-8 flex items-center justify-center bg-white border border-gray-200 rounded-md hover:bg-gray-50">
            <svg class="w-3.5 h-3.5 text-gray-700" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
          </button>
          <button class="h-8 min-w-8 px-3 py-1.5 bg-gray-100 border border-gray-200 rounded-md text-sm font-semibold text-gray-900 leading-5">1</button>
          <button class="h-8 min-w-8 px-3 py-1.5 bg-white border border-gray-200 rounded-md text-sm font-semibold text-gray-900 leading-5 hover:bg-gray-50">2</button>
          <button class="h-8 min-w-8 px-3 py-1.5 bg-white border border-gray-200 rounded-md text-sm font-semibold text-gray-900 leading-5 hover:bg-gray-50">3</button>
          <button class="w-8 h-8 flex items-center justify-center bg-white border border-gray-200 rounded-md hover:bg-gray-50">
            <svg class="w-3.5 h-3.5 text-gray-700" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
          </button>
        </div>
      </div>
    </div>
  </section>

</body>
</html>
